<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlumPro — Gestión de Aberturas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F1E;
    --surface: #111827;
    --surface2: #1A2438;
    --border: #1E2D45;
    --border2: #263548;
    --accent: #00E5A0;
    --accent2: #0066FF;
    --text: #F0F4FF;
    --text2: #8899BB;
    --text3: #4A5A7A;
    --danger: #FF4D6A;
    --warning: #FFB830;
    --info: #2B8EFF;
    --success: #00E5A0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .header-nav { display: flex; gap: 4px; }
  .nav-btn {
    padding: 7px 16px; background: transparent; border: none; color: var(--text2);
    cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
    border-radius: 8px; font-weight: 500; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--surface2); color: var(--accent); font-weight: 600; }
  .back-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: transparent; border: 1px solid var(--border2); color: var(--text2);
    cursor: pointer; font-size: 13px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { border-color: var(--text3); color: var(--text); }

  /* LAYOUT */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* BUTTONS */
  .btn-primary {
    padding: 10px 22px; background: var(--accent); color: #0A0F1E;
    border: none; border-radius: 9px; font-weight: 700; cursor: pointer;
    font-size: 14px; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    padding: 10px 22px; background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 9px; font-weight: 500;
    cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .btn-secondary:hover { border-color: var(--text3); color: var(--text); }
  .btn-danger {
    padding: 6px 14px; background: transparent; color: var(--danger);
    border: 1px solid var(--danger)44; border-radius: 7px; font-size: 12px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-icon { background: transparent; border: none; cursor: pointer; padding: 4px; color: var(--text3); font-size: 16px; }
  .btn-icon:hover { color: var(--text); }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .form-row .form-group { flex: 1; min-width: 140px; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, textarea {
    width: 100%; padding: 10px 14px; background: var(--bg);
    border: 1px solid var(--border2); border-radius: 8px; color: var(--text);
    font-size: 14px; outline: none; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input[type=number] { font-family: 'DM Mono', monospace; }
  select option { background: var(--surface); }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card-clickable { cursor: pointer; }
  .card-clickable:hover { border-color: var(--accent)44; transform: translateY(-1px); }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }

  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; transition: all 0.15s; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 64px 24px; }
  .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.5; }
  .empty p { color: var(--text3); font-size: 15px; margin-bottom: 20px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; color: var(--text3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 22px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast-msg { padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; animation: slideIn 0.2s ease; }
  .toast-success { background: var(--accent); color: #0A0F1E; }
  .toast-error { background: var(--danger); color: #fff; }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LOADER */
  .loader { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--text3); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* PAGE HEADER */
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
  .page-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

  /* PRESUPUESTO DETAIL */
  .detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 14px; }
  .detail-cliente { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .detail-obra { font-size: 14px; color: var(--text3); margin-top: 3px; }
  .detail-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ABERTURA CARD */
  .ab-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .ab-nombre { font-size: 15px; font-weight: 600; }
  .ab-meta { font-size: 12px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .ab-costo { font-size: 16px; font-weight: 700; color: var(--accent); text-align: right; }

  /* PREVIEW */
  .preview-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 14px 0; }
  .preview-title { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .preview-row { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; font-size: 13px; color: var(--text2); padding: 5px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; }
  .preview-row:last-child { border-bottom: none; }
  .preview-total { display: grid; grid-template-columns: 1fr auto; gap: 14px; font-size: 14px; font-weight: 700; color: var(--accent); padding: 10px 0 0; margin-top: 6px; border-top: 1px solid var(--border2); }

  /* RESUMEN */
  .resumen-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--text2); padding: 10px 0; border-bottom: 1px solid var(--border); }
  .total-final { display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-radius: 10px; padding: 16px 20px; margin-top: 16px; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }

  /* MATERIAL ROW */
  .mat-row { display: grid; grid-template-columns: 1fr auto auto; gap: 16px; align-items: center; background: var(--surface2); border-radius: 9px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); }
  .mat-nombre { font-size: 14px; font-weight: 500; }
  .mat-barras { display: flex; gap: 8px; align-items: center; }
  .mat-badge { background: var(--accent)22; color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .mat-costo { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; text-align: right; }

  /* AGREGAR ABERTURA */
  .add-ab-wrap { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; margin-top: 12px; }
  .add-ab-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .btn-add-ab { width: 100%; padding: 14px; background: transparent; border: 2px dashed var(--border2); border-radius: 12px; color: var(--text3); cursor: pointer; font-size: 14px; margin-top: 12px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-add-ab:hover { border-color: var(--accent)55; color: var(--accent); }

  /* KANBAN */
  .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
  .kanban-col { flex: 0 0 280px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .kanban-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .kanban-count { background: var(--surface2); color: var(--text3); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .kanban-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .kanban-card:hover { border-color: var(--border2); }
  .kanban-card-cliente { font-size: 14px; font-weight: 600; }
  .kanban-card-obra { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .kanban-card-total { font-size: 13px; color: var(--accent); font-weight: 700; margin-top: 10px; font-family: 'DM Mono', monospace; }
  .kanban-move { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .kanban-move button { padding: 4px 10px; background: transparent; border: 1px solid var(--border2); color: var(--text3); border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .kanban-move button:hover { border-color: var(--accent)55; color: var(--accent); }

  /* STOCK */
  .stock-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 16px; align-items: center; background: var(--surface2); border-radius: 9px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); }

  /* CONFIG */
  .config-section { margin-bottom: 32px; }
  .config-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text2); display: flex; align-items: center; gap: 10px; }
  .config-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>

<div id="toast"></div>

    <div class="logo-icon">⬡</div>

  <nav class="header-nav" id="mainNav">

<script>
// ============================================================
// CONFIG APPS SCRIPT
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDm-WheJ6jntNWVz4ovhLwzEpgKxNjRUTrn7dz5gqcEhVIcdVzCoeZXFMYDZWHkx33rg/exec';

const SHEETS = {
  presupuestos: 'Presupuestos',
  aberturas:    'Aberturas',
  lineas:       'Lineas',
  perfiles:     'Perfiles',
  herrajes:     'Herrajes',
  stock:        'Stock',
  precios_kg:   'PreciosKg',
  config:       'Config',
};

// ============================================================
// SHEETS API (via Apps Script)
// ============================================================
async function sheetsGet(sheetName) {
  try {
    const url = `${SCRIPT_URL}?action=get&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    const json = await res.json();
    return json.ok ? json.data : [];
  } catch(e) { console.error('sheetsGet error', e); return []; }
}

async function sheetsAppend(sheetName, rowObj) {
  try {
    const url = `${SCRIPT_URL}?action=append&sheet=${encodeURIComponent(sheetName)}&data=${encodeURIComponent(JSON.stringify(rowObj))}`;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
  } catch(e) { console.error('sheetsAppend error', e); throw e; }
}

async function sheetsUpdateRow(sheetName, id, updates) {
  try {
    const url = `${SCRIPT_URL}?action=update&sheet=${encodeURIComponent(sheetName)}&id=${encodeURIComponent(id)}&data=${encodeURIComponent(JSON.stringify(updates))}`;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
  } catch(e) { console.error('sheetsUpdateRow error', e); }
}

async function sheetsDeleteRow(sheetName, id) {
  try {
    const url = `${SCRIPT_URL}?action=delete&sheet=${encodeURIComponent(sheetName)}&id=${encodeURIComponent(id)}`;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
  } catch(e) { console.error('sheetsDeleteRow error', e); }
}

// ============================================================
// UTILS
// ============================================================
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(n) { return '$' + Math.round(Number(n) || 0).toLocaleString('es-AR'); }
function today() { return new Date().toLocaleDateString('es-AR'); }

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-msg toast-${type}`;
  el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Precios por kg: { id, nombre, tipo (nuevo/recuperado), precio_kg }

// Obtiene los cortes raw de una abertura sin calcular costos
function getCortesRaw(linea_id, tipo_id, W, H, params, perfilesDB) {
  const tipos = TIPOS_ABERTURA[linea_id];
  if (!tipos) return [];
  const tipo = tipos.find(t => t.id === tipo_id);
  if (!tipo) return [];
  const perfilesFiltrados = perfilesDB.filter(p => p.linea_id === linea_id);
  const N = Number(params.hojas) || 1;
  const cfg = getConfigTipo(linea_id, tipo_id);
  let cortesRaw;
  if (cfg && cfg.perfiles && cfg.perfiles.length > 0) {
    cortesRaw = cfg.perfiles
      .filter(pf => !pf.solo_si_n || String(pf.solo_si_n) === String(N))
      .map(pf => {
        const perfil = perfilesFiltrados.find(p => p.codigo === pf.codigo || p.id === pf.codigo);
        if (!perfil) return null;
        const cantNum = Math.round(Function('N','return '+pf.cantidad)(N));
        const largoNum = evalFormula(pf.formula_largo, W, H, N);
        return { perfil, cantidad: cantNum, largo: largoNum, desc: pf.rol };
      }).filter(Boolean);
  } else {
    cortesRaw = tipo.cortes(W, H, params, perfilesFiltrados);
  }
  return cortesRaw;
}

// Bin packing First Fit Decreasing sobre una lista de piezas con barras ya existentes
// existingBarras: { [perfilKey]: [{ piezas, resto }] } — barras ya usadas por aberturas anteriores
// Devuelve { resultado, barrasFinales }
function optimizarCortesConSobrantes(cortesAgrupados, perfilesDB, precioKg, existingBarras) {
  existingBarras = existingBarras || {};
  const resultado = [];
  // Clonar barras existentes para no mutarlas
  const barrasActuales = {};
  for (const [k, barras] of Object.entries(existingBarras)) {
    barrasActuales[k] = barras.map(b => ({ piezas: [...b.piezas], resto: b.resto }));
  }

  for (const [perfilId, piezas] of Object.entries(cortesAgrupados)) {
    const perfil = perfilesDB.find(p => p.id === perfilId || p.codigo === perfilId);
    if (!perfil) continue;

    const lista = [];
    for (const p of piezas) for (let i = 0; i < p.cantidad; i++) lista.push({ largo: Number(p.largo), desc: p.desc });
    lista.sort((a, b) => b.largo - a.largo);

    // Usar barras existentes de este perfil como punto de partida
    const barras = barrasActuales[perfilId] || [];
    const barrasNuevas = []; // solo las barras nuevas que se necesitan para esta abertura
    let barrasAntesDeEstaAbertura = barras.length;

    for (const pieza of lista) {
      let ok = false;
      // Primero intentar en barras ya existentes (sobrantes)
      for (const b of barras) {
        if (b.resto >= pieza.largo) {
          b.piezas.push({ ...pieza, esAhorro: true });
          b.resto -= pieza.largo;
          ok = true;
          break;
        }
      }
      // Si no entró, abrir barra nueva
      if (!ok) {
        const nuevaBarra = { piezas: [pieza], resto: Number(perfil.largo_barra) - pieza.largo, nueva: true };
        barras.push(nuevaBarra);
        barrasNuevas.push(nuevaBarra);
      }
    }

    barrasActuales[perfilId] = barras;

    const pesoTira = Number(perfil.peso_tira) || 0;
    const costoPorBarra = pesoTira * precioKg;
    // Solo se cobran las barras NUEVAS que necesitó esta abertura
    const costoTotal = barrasNuevas.length * costoPorBarra;
    const esAhorro = barrasNuevas.length === 0; // todas las piezas entraron en sobrantes

    resultado.push({
      perfil,
      barras: barrasNuevas,
      barrasTotal: barras,
      cantBarras: barrasNuevas.length,
      cantBarrasTotal: barras.length,
      barrasAnteriores: barrasAntesDeEstaAbertura,
      pesoTira,
      costoPorBarra,
      costo: costoTotal,
      esAhorro,
    });
  }

  return { resultado, barrasFinales: barrasActuales };
}

// Versión simple (sin sobrantes) — para compatibilidad
function optimizarCortes(cortesAgrupados, perfilesDB, precioKg) {
  return optimizarCortesConSobrantes(cortesAgrupados, perfilesDB, precioKg, {}).resultado;
}

// Construye el mapa de barras existentes a partir de las aberturas ya guardadas en el presupuesto
function getBarrasExistentes(absExistentes, perfilesDB) {
  const barrasMap = {};
  for (const a of absExistentes) {
    const opts = Array.isArray(a.optimizacion) ? a.optimizacion : tryParse(a.optimizacion, []);
    for (const opt of opts) {
      const perfil = opt.perfil || {};
      const k = perfil.codigo || perfil.id || opt.perfil_id || '';
      if (!k) continue;
      const largoBarra = Number(perfil.largo_barra || 6000);
      if (!barrasMap[k]) barrasMap[k] = [];
      // Reconstruir barras desde el detalle guardado
      const barras = opt.barras || opt.barrasTotal || [];
      for (const b of barras) {
        barrasMap[k].push({
          piezas: (b.piezas || []).map(pz => ({ ...pz })),
          resto: Number(b.resto || 0),
        });
      }
    }
  }
  return barrasMap;
}


function calcularAbertura(linea_id, tipo_id, W, H, params, perfilesDB, herrajesDB, precioVidrio, precioKg, barrasExistentes) {
  const tipos = TIPOS_ABERTURA[linea_id];
  if (!tipos) return null;
  const tipo = tipos.find(t => t.id === tipo_id);
  if (!tipo) return null;
  const perfilesFiltrados = perfilesDB.filter(p => p.linea_id === linea_id);
  const N = Number(params.hojas) || 1;
  const cfg = getConfigTipo(linea_id, tipo_id);

  const cortesRaw = getCortesRaw(linea_id, tipo_id, W, H, params, perfilesDB);

  // Vidrios
  let vidrios;
  if (cfg && cfg.vidrio && cfg.vidrio.formula_ancho && cfg.vidrio.formula_alto) {
    const vAncho = evalFormula(cfg.vidrio.formula_ancho, W, H, N);
    const vAlto  = evalFormula(cfg.vidrio.formula_alto,  W, H, N);
    vidrios = Array.from({ length: N }, (_, i) => ({ desc: 'Vidrio hoja ' + (i+1), ancho: vAncho, alto: vAlto }));
  } else {
    vidrios = tipo.vidrios(W, H, params);
  }

  const agrupados = {};
  for (const c of cortesRaw) {
    if (!c.perfil) continue;
    const key = c.perfil.codigo || c.perfil.id;
    if (!agrupados[key]) agrupados[key] = [];
    agrupados[key].push({ largo: c.largo, cantidad: c.cantidad, desc: c.desc });
  }

  const { resultado: optimizacion, barrasFinales } = optimizarCortesConSobrantes(
    agrupados, perfilesFiltrados, precioKg, barrasExistentes || {}
  );

  const costoPerfiles = optimizacion.reduce((s, o) => s + o.costo, 0);
  const costoVidrios = vidrios.reduce((s, v) => s + (v.ancho / 1000) * (v.alto / 1000) * precioVidrio, 0);
  const herrajesCalc = tipo.herrajes(params);
  const herrajesFiltrados = herrajesDB.filter(h => h.linea_id === linea_id);
  const costoHerrajes = herrajesCalc.reduce((s, h) => {
    const hObj = herrajesFiltrados.find(x => x.id === h.id);
    return s + (hObj ? Number(hObj.precio) * h.cantidad : 0);
  }, 0);
  return { optimizacion, vidrios, costoPerfiles, costoVidrios, costoHerrajes, barrasFinales };
}

// Obtener config activa para una tipología (usa state si fue editada, sino default)
function getConfigTipo(linea_id, tipo_id) {
  const custom = state.config_tipologias?.[linea_id]?.[tipo_id];
  const def = CONFIG_TIPOLOGIAS_DEFAULT[linea_id]?.[tipo_id];
  return custom || def || null;
}

// Evaluar fórmula simple (solo operaciones con W, H, N)
function evalFormula(formula, W, H, N) {
  try {
    return Math.round(Function('W','H','N', 'return ' + formula)(W, H, N || 1));
  } catch { return 0; }
}

function navigate(vista, extra) {
  state.vista = vista;
  state.presupuestoActivo = extra || null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { presupuestos: 0, kanban: 1, stock: 2, config: 3 };

// ============================================================
// LOAD DATA
// ============================================================
async function loadAll() {
  setLoading(true);
  try {
    const [presupuestos, aberturas, lineas, perfiles, herrajes, stock, precios_kg, configRows] = await Promise.all([
      sheetsGet(SHEETS.presupuestos),
      sheetsGet(SHEETS.aberturas),
      sheetsGet(SHEETS.lineas),
      sheetsGet(SHEETS.perfiles),
      sheetsGet(SHEETS.herrajes),
      sheetsGet(SHEETS.stock),
      sheetsGet(SHEETS.precios_kg),
      sheetsGet(SHEETS.config),
    ]);
    state.presupuestos = presupuestos;
    state.aberturas = aberturas.map(a => ({ ...a, params: tryParse(a.params, {}), optimizacion: tryParse(a.optimizacion, []), vidrios: tryParse(a.vidrios, []) }));
    state.lineas     = lineas.length     ? lineas     : LINEAS_DEFAULT;
    state.perfiles   = perfiles.length   ? perfiles   : PERFILES_DEFAULT;
    state.herrajes   = herrajes.length   ? herrajes   : HERRAJES_DEFAULT;
    state.precios_kg = precios_kg.length ? precios_kg : PRECIOS_KG_DEFAULT;
    state.stock      = stock;

    // Restaurar config de tipologías guardada
    state.config_tipologias = {};
    for (const row of configRows) {
      if (row.key && row.key.startsWith('tipologia_')) {
        try {
          const parsed = JSON.parse(row.value);
          // key formato: tipologia_linea_id__tipo_id
          const parts = row.key.replace('tipologia_', '').split('__');
          const [linea_id, tipo_id] = parts;
          if (linea_id && tipo_id) {
            if (!state.config_tipologias[linea_id]) state.config_tipologias[linea_id] = {};
            state.config_tipologias[linea_id][tipo_id] = parsed;
          }
        } catch {}
      }
    }

    // Cargar defaults si es primera vez
    if (!lineas.length)     for (const l of LINEAS_DEFAULT)     await sheetsAppend(SHEETS.lineas, l);
    if (!perfiles.length)   for (const p of PERFILES_DEFAULT)   await sheetsAppend(SHEETS.perfiles, p);
    if (!herrajes.length)   for (const h of HERRAJES_DEFAULT)   await sheetsAppend(SHEETS.herrajes, h);
    if (!precios_kg.length) for (const p of PRECIOS_KG_DEFAULT) await sheetsAppend(SHEETS.precios_kg, p);
  } catch(e) { toast('Error cargando datos', 'error'); }
  setLoading(false);
  render();
}

function tryParse(val, def) { try { return val ? JSON.parse(val) : def; } catch { return def; } }
function setLoading(v) { state.loading = v; }

// ============================================================
function attachEvents() {}

function render() {
  const root = document.getElementById('appRoot');
  if (state.loading) { root.innerHTML = '<div class="loader"><div class="spinner"></div> Cargando...</div>'; return; }
  if (state.vista === 'presupuestos' && !state.presupuestoActivo) root.innerHTML = renderLista();
  else if (state.vista === 'presupuestos' && state.presupuestoActivo) root.innerHTML = renderDetalle();
  else if (state.vista === 'kanban') root.innerHTML = renderKanban();
  else if (state.vista === 'stock') root.innerHTML = renderStock();
  else if (state.vista === 'config') root.innerHTML = renderConfig();
  attachEvents();
}

function renderDetalle() {
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (!p) return '<p>No encontrado</p>';
  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
  const tab = state._tab || 'aberturas';

  const costoP = abs.reduce((s, a) => s + Number(a.costo_perfiles || 0), 0);
  const costoV = abs.reduce((s, a) => s + Number(a.costo_vidrios || 0), 0);
  const costoH = abs.reduce((s, a) => s + Number(a.costo_herrajes || 0), 0);
  const subtotal = costoP + costoV + costoH;
  const markup = Number(p.markup || 0);
  const totalFinal = subtotal * (1 + markup / 100);

  const estadoOpts = ESTADOS.map(e => `<option value="${e.id}" ${p.estado===e.id?'selected':''}>${e.label}</option>`).join('');

  let tabContent = '';
  if (tab === 'aberturas') {
    const abCards = abs.map((a, idx) => {
      const cTotal = Number(a.costo_perfiles||0)+Number(a.costo_vidrios||0)+Number(a.costo_herrajes||0);
      return `
      <div class="ab-card">
        <div style="flex:1">
          <div class="ab-nombre">${a.nombre}</div>
          <div class="ab-meta">${a.ancho}x${a.alto} mm · ${a.cantidad} u. · ${a.linea}</div>
        </div>
        <div style="text-align:right">
          <div class="ab-costo">${fmt(cTotal * Number(a.cantidad))}</div>
          <button class="btn-danger" style="margin-top:6px" onclick="eliminarAbertura('${a.id}')">✕ Eliminar</button>
        </div>
      </div>`;
    }).join('');
    tabContent = `
      ${abCards}
      <div id="addAbWrap"></div>
      <button class="btn-add-ab" onclick="showAddAbertura()">+ Agregar abertura</button>`;
  }

  if (tab === 'calculo') {
    // Consolidar materiales — robusto ante datos del Sheet
    const consolidado = {};
    for (const a of abs) {
      const opts = Array.isArray(a.optimizacion) ? a.optimizacion : [];
      for (const opt of opts) {
        const perfil = opt.perfil || {};
        const k = perfil.id || perfil.codigo || opt.perfil_id || opt.perfil_nombre || 'desconocido';
        const nombre = perfil.nombre || perfil.codigo || opt.perfil_nombre || k;
        const codigo = perfil.codigo || '';
        const cantBarras = Number(opt.cantBarras || opt.cant_barras || 0);
        const costo = Number(opt.costo || 0);
        const costoPorBarra = cantBarras > 0 ? costo / cantBarras : 0;
        const largoBarra = Number(perfil.largo_barra || 6000);
        const barras = opt.barras || [];
        if (!consolidado[k]) consolidado[k] = { nombre, codigo, barras: 0, costo: 0, costoPorBarra, largoBarra, detalleBarras: [] };
        consolidado[k].barras += cantBarras;
        consolidado[k].costo += costo;
        if (!consolidado[k].costoPorBarra && costoPorBarra) consolidado[k].costoPorBarra = costoPorBarra;
        // Acumular detalle de barras para mostrar cortes
        barras.forEach((b, bi) => {
          consolidado[k].detalleBarras.push({ barra: consolidado[k].detalleBarras.length + 1, piezas: b.piezas || [], resto: b.resto, abertura: a.nombre });
        });
      }
    }

    const tieneConsolidado = Object.keys(consolidado).length > 0;

    const matRows = tieneConsolidado
      ? Object.entries(consolidado).map(([k, m]) => {
          // Detalle de barras expandible
          const rowId = 'mr_' + k.replace(/[^a-zA-Z0-9]/g, '_');
          const barrasHtml = m.detalleBarras.map(b => {
            const piezasHtml = (b.piezas || []).map(pz =>
              '<span style="display:inline-block;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44;border-radius:4px;padding:2px 7px;font-size:11px;font-family:\'DM Mono\',monospace;margin:2px;">'
              + pz.largo + 'mm'
              + (pz.desc ? '<span style="color:var(--text3);font-size:10px;margin-left:4px;">'+pz.desc+'</span>' : '')
              + '</span>'
            ).join('');
            const usadoMm = m.largoBarra - (b.resto || 0);
            const pct = Math.round((usadoMm / m.largoBarra) * 100);
            const colorBarra = pct > 90 ? 'var(--accent)' : pct > 70 ? '#FFB830' : '#FF4D6A';
            return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:6px;">'
              + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
                + '<span style="font-size:11px;font-weight:700;color:var(--text3)">BARRA ' + b.barra + '</span>'
                + '<span style="font-size:11px;font-family:\'DM Mono\',monospace;color:'+colorBarra+'">'
                  + usadoMm + '/' + m.largoBarra + 'mm · resto: ' + (b.resto||0) + 'mm · ' + pct + '%'
                + '</span>'
              + '</div>'
              // Barra visual
              + '<div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;">'
                + '<div style="height:100%;width:'+pct+'%;background:'+colorBarra+';border-radius:4px;transition:width 0.3s;"></div>'
              + '</div>'
              + piezasHtml
              + '<div style="font-size:10px;color:var(--text3);margin-top:4px;">← '+b.abertura+'</div>'
            + '</div>';
          }).join('');

          return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;">'
            + '<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleMatRow(\''+rowId+'\')">'
              + '<div style="display:flex;align-items:center;gap:10px;">'
                + (m.codigo ? '<span style="font-family:\'DM Mono\',monospace;color:var(--accent);font-size:12px;background:var(--accent)11;padding:2px 8px;border-radius:4px;">['+m.codigo+']</span>' : '')
                + '<span style="font-weight:600;color:var(--text)">' + m.nombre + '</span>'
              + '</div>'
              + '<div style="display:flex;align-items:center;gap:16px;">'
                + '<span class="mat-badge">' + m.barras + ' barra' + (m.barras!==1?'s':'') + '</span>'
                + '<span style="font-family:\'DM Mono\',monospace;color:var(--accent);font-weight:700;">' + fmt(m.costo) + '</span>'
                + '<span style="color:var(--text3);font-size:12px;">▼</span>'
              + '</div>'
            + '</div>'
            + '<div id="'+rowId+'" style="display:none;">' + barrasHtml + '</div>'
          + '</div>';
        }).join('')
      : '<div style="color:var(--text3);padding:24px;text-align:center;border:1px dashed var(--border2);border-radius:8px">Sin datos de materiales. Agregá aberturas al presupuesto primero.</div>';

    const detalle = abs.map(a => {
      const opts = Array.isArray(a.optimizacion) ? a.optimizacion : [];
      const filas = opts.map(opt => {
        const perfil = opt.perfil || {};
        const nombre = perfil.nombre || perfil.codigo || opt.perfil_nombre || '-';
        const codigo = perfil.codigo || '';
        const cantBarras = Number(opt.cantBarras || opt.cant_barras || 0);

          + '<span>' + (codigo ? '['+codigo+'] ' : '') + nombre + '</span>'
          + '<span style="color:var(--text3)">' + cantBarras + ' barra' + (cantBarras!==1?'s':'') + '</span>'
          + '<span>' + fmt(Number(opt.costo||0)) + '</span>'
          + '</div>';
      }).join('');
      const vidrioFilas = (tryParse(a.vidrios, []) || []).map(v =>
        '<div class="preview-row">'
        + '<span>' + v.desc + ' (' + v.ancho + 'x' + v.alto + 'mm)</span>'
        + '<span style="color:var(--text3)">' + ((v.ancho/1000)*(v.alto/1000)).toFixed(2) + ' m²</span>'
        + '<span>' + fmt((v.ancho/1000)*(v.alto/1000)*Number(a.precio_vidrio||8500)) + '</span>'
        + '</div>'
      ).join('');
      const vidrios = tryParse(a.vidrios, []) || [];
      const sinDatos = !opts.length && !vidrios.length;
      return '<div style="margin-bottom:18px">'
        + '<div style="font-size:13px;font-weight:700;color:var(--text3);background:var(--bg);padding:8px 12px;border-radius:7px;margin-bottom:6px">'
          + a.nombre + ' — ' + a.ancho + 'x' + a.alto + 'mm x ' + a.cantidad + ' u.'
        + '</div>'
        + (sinDatos ? '<div style="color:var(--text3);font-size:12px;padding:6px 12px">Sin detalle guardado</div>' : filas + vidrioFilas)
        + '</div>';
    }).join('');

    tabContent = `
      <h3 style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.05em">Materiales consolidados — click para ver cortes por barra</h3>
      ${matRows}
      <h3 style="font-size:14px;font-weight:700;color:var(--text2);margin:24px 0 14px;text-transform:uppercase;letter-spacing:0.05em">Detalle por abertura</h3>
      ${detalle || '<p style="color:var(--text3)">Sin aberturas</p>'}`;
  }

  if (tab === 'resumen') {
    tabContent = `
      <div style="max-width:480px">
        <div class="card">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:18px">Resumen de costos</div>
          <div class="resumen-row"><span>Perfiles de aluminio</span><span style="font-family:'DM Mono',monospace">${fmt(costoP)}</span></div>
          <div class="resumen-row"><span>Vidrios</span><span style="font-family:'DM Mono',monospace">${fmt(costoV)}</span></div>
          <div class="resumen-row"><span>Herrajes</span><span style="font-family:'DM Mono',monospace">${fmt(costoH)}</span></div>
          <div class="resumen-row" style="font-weight:700;border-top:1px solid var(--border2);margin-top:8px;padding-top:14px">

        <span class="badge" style="background:#FFB83022;color:#FFB830;font-family:'DM Mono',monospace">${fmt(p.precio_kg || 0)}/kg</span>

    </div>

  <div class="tabs">
    <button class="tab ${tab==='aberturas'?'active':''}" onclick="setTab('aberturas')">Aberturas</button>
    <button class="tab ${tab==='calculo'?'active':''}" onclick="setTab('calculo')">Materiales</button>
    <button class="tab ${tab==='resumen'?'active':''}" onclick="setTab('resumen')">Resumen</button>
  </div>

}

function toggleMatRow(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function setConfigLinea(linea_id) {
  state._configLinea = linea_id;
  const tipos = TIPOS_ABERTURA[linea_id] || [];
  state._configTipo = tipos[0]?.id || '';
  render();
}

function setConfigTipo(tipo_id) {
  state._configTipo = tipo_id;
  render();
}

function _ensureConfigTipo(linea_id, tipo_id) {
  if (!state.config_tipologias[linea_id]) state.config_tipologias[linea_id] = {};
  if (!state.config_tipologias[linea_id][tipo_id]) {
    const def = CONFIG_TIPOLOGIAS_DEFAULT[linea_id]?.[tipo_id];
    state.config_tipologias[linea_id][tipo_id] = def
      ? { perfiles: def.perfiles.map(p => ({...p})), vidrio: {...def.vidrio} }
      : { perfiles: [], vidrio: { formula_ancho: '', formula_alto: '' } };
  }
  return state.config_tipologias[linea_id][tipo_id];
}

// Guarda config de una tipología en la pestaña Config del Sheet
async function saveConfigTipo(linea_id, tipo_id) {
  const cfg = state.config_tipologias?.[linea_id]?.[tipo_id];
  if (!cfg) return;
  const key = 'tipologia_' + linea_id + '__' + tipo_id;
  const value = JSON.stringify(cfg);
  // Buscar si ya existe una fila con esta key
  const existing = await sheetsGet(SHEETS.config);
  const row = existing.find(r => r.key === key);
  if (row) {
    await sheetsUpdateRow(SHEETS.config, row.id, { key, value });
  } else {
    await sheetsAppend(SHEETS.config, { id: genId(), key, value });
  }
}

function updateConfigPerfil(linea_id, tipo_id, idx, campo, valor) {
  const cfg = _ensureConfigTipo(linea_id, tipo_id);
  if (cfg.perfiles[idx]) cfg.perfiles[idx][campo] = valor;
  saveConfigTipo(linea_id, tipo_id);
  toast('Guardado');
}

function updateConfigVidrio(linea_id, tipo_id, campo, valor) {
  const cfg = _ensureConfigTipo(linea_id, tipo_id);
  cfg.vidrio[campo] = valor;
  saveConfigTipo(linea_id, tipo_id);
  toast('Guardado');
}

async function resetConfigTipo(linea_id, tipo_id) {
  if (!state.config_tipologias[linea_id]) state.config_tipologias[linea_id] = {};
  delete state.config_tipologias[linea_id][tipo_id];
  // Borrar del Sheet
  const key = 'tipologia_' + linea_id + '__' + tipo_id;
  const existing = await sheetsGet(SHEETS.config);
  const row = existing.find(r => r.key === key);
  if (row) await sheetsDeleteRow(SHEETS.config, row.id);
  toast('Restaurado a valores por defecto');
  render();
}

function setTab(tab) { state._tab = tab; render(); }

async function cambiarEstado(nuevoEstado) {
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (!p) return;
  p.estado = nuevoEstado;
  if (nuevoEstado === 'aprobado' && !p.kanban_col) p.kanban_col = 'pendiente';
  await sheetsUpdateRow(SHEETS.presupuestos, p.id, { estado: nuevoEstado, kanban_col: p.kanban_col || '' });
  toast('Estado actualizado');
  render();
}

async function actualizarMarkup(val) {
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (!p) return;
  const mk = parseFloat(val) || 0;
  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
  const sub = abs.reduce((s, a) => s + Number(a.costo_perfiles||0) + Number(a.costo_vidrios||0) + Number(a.costo_herrajes||0), 0);
  const total = sub * (1 + mk / 100);
  p.markup = mk; p.total_final = total;
  await sheetsUpdateRow(SHEETS.presupuestos, p.id, { markup: mk, total_final: total });
  render();
}

async function moverKanban(id, col) {
  const p = state.presupuestos.find(x => x.id === id);
  if (!p) return;
  p.kanban_col = col;
  await sheetsUpdateRow(SHEETS.presupuestos, id, { kanban_col: col });
  toast('Movido a ' + KANBAN_COLS.find(c => c.id === col)?.label);
  render();
}

async function eliminarAbertura(id) {
  if (!confirm('¿Eliminar esta abertura? Los costos del presupuesto se recalcularán.')) return;

  // Eliminar del state y Sheet
  state.aberturas = state.aberturas.filter(a => a.id !== id);
  await sheetsDeleteRow(SHEETS.aberturas, id);

  // Recalcular bin packing completo para las aberturas restantes
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (p) {
    const precioKg = getPrecioKgPresupuesto(p);
    const absRestantes = state.aberturas.filter(a => a.presupuesto_id === state.presupuestoActivo);

    // Recalcular cada abertura en orden, acumulando barras
    let barrasAcumuladas = {};
    for (const a of absRestantes) {
      const params = tryParse(a.params, {});
      const res = calcularAbertura(
        a.linea_id, a.tipo_id,
        Number(a.ancho), Number(a.alto),
        params, state.perfiles, state.herrajes,
        Number(a.precio_vidrio || 8500), precioKg,
        barrasAcumuladas
      );
      if (!res) continue;

      // Actualizar costos en state
      a.costo_perfiles = res.costoPerfiles;
      a.costo_vidrios  = res.costoVidrios;
      a.costo_herrajes = res.costoHerrajes;
      a.optimizacion   = JSON.stringify(res.optimizacion);
      a.vidrios        = JSON.stringify(res.vidrios);

      // Actualizar en Sheet
      await sheetsUpdateRow(SHEETS.aberturas, a.id, {
        costo_perfiles: res.costoPerfiles,
        costo_vidrios:  res.costoVidrios,
        costo_herrajes: res.costoHerrajes,
        optimizacion:   JSON.stringify(res.optimizacion),
        vidrios:        JSON.stringify(res.vidrios),
      });

      // Acumular barras para la siguiente
      barrasAcumuladas = res.barrasFinales;
    }
  }

  await recalcularTotal();
  toast('Abertura eliminada — costos recalculados');
  render();
}

async function recalcularTotal() {
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (!p) return;
  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
  const sub = abs.reduce((s, a) => s + Number(a.costo_perfiles||0) + Number(a.costo_vidrios||0) + Number(a.costo_herrajes||0), 0);
  const total = sub * (1 + Number(p.markup||0) / 100);
  p.total_final = total;
  await sheetsUpdateRow(SHEETS.presupuestos, p.id, { total_final: total });
}

async function eliminarStock(id) {
  if (!confirm('¿Eliminar este sobrante?')) return;
  state.stock = state.stock.filter(s => s.id !== id);
  await sheetsDeleteRow(SHEETS.stock, id);
  toast('Sobrante eliminado');
  render();
}

async function eliminarLinea(id) {
  if (!confirm('¿Eliminar esta línea?')) return;
  state.lineas = state.lineas.filter(l => l.id !== id);
  await sheetsDeleteRow(SHEETS.lineas, id);

}
async function eliminarPerfil(id) {
  if (!confirm('¿Eliminar este perfil?')) return;
  state.perfiles = state.perfiles.filter(p => p.id !== id);

  toast('Perfil eliminado'); render();
}
async function eliminarHerraje(id) {
  if (!confirm('¿Eliminar este herraje?')) return;
  state.herrajes = state.herrajes.filter(h => h.id !== id);
  await sheetsDeleteRow(SHEETS.herrajes, id);

function showModal(html) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modalOverlay';
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() { document.getElementById('modalOverlay')?.remove(); }

function showModalNuevoPresupuesto() {
  const lineaOpts = state.lineas.map(l => `<option value="${l.id}">${l.nombre}</option>`).join('');
  showModal(`
    <div class="modal-title">Nuevo Presupuesto</div>
    <div class="form-group"><label>Cliente</label><input id="m_cliente" placeholder="Nombre del cliente"></div>
    <div class="form-group"><label>Obra / Descripcion</label><input id="m_obra" placeholder="Ej: Casa Martínez - Dormitorio"></div>
    <div class="form-group">
      <label>Linea de aluminio</label>
      <select id="m_linea_ppto" onchange="updateTiposYPrecios()">${lineaOpts}</select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo de aluminio</label>
        <select id="m_tipo_al" onchange="updatePrecioKg()">
          <option value="nuevo">Nuevo</option>
          <option value="recuperado">Recuperado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Color</label>
        <select id="m_color_al" onchange="updatePrecioKg()"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Precio por kg ($/kg)</label>
      <input type="number" id="m_precio_kg" placeholder="Se completa automáticamente" style="font-family:'DM Mono',monospace">
    </div>
    <div class="form-group"><label>Fecha</label><input id="m_fecha" value="${today()}"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="crearPresupuesto()">Crear →</button>
    </div>`);
  updateTiposYPrecios();
}

function updateTiposYPrecios() {
  const linea_id = document.getElementById('m_linea_ppto')?.value;
  const tipo = document.getElementById('m_tipo_al')?.value || 'nuevo';
  const preciosFiltrados = state.precios_kg.filter(p => p.linea_id === linea_id && p.tipo === tipo);
  const colores = [...new Set(preciosFiltrados.map(p => p.nombre))];
  const colorSel = document.getElementById('m_color_al');
  if (colorSel) {
    colorSel.innerHTML = colores.map(c => `<option value="${c}">${c}</option>`).join('');
  }
  updatePrecioKg();
}

function updatePrecioKg() {
  const linea_id = document.getElementById('m_linea_ppto')?.value;
  const tipo  = document.getElementById('m_tipo_al')?.value;
  const color = document.getElementById('m_color_al')?.value;
  const match = state.precios_kg.find(p => p.linea_id === linea_id && p.tipo === tipo && p.nombre === color);
  const input = document.getElementById('m_precio_kg');
  if (input && match) input.value = match.precio_kg;
}

async function crearPresupuesto() {
  const cliente   = document.getElementById('m_cliente')?.value?.trim();
  const obra      = document.getElementById('m_obra')?.value?.trim();
  const fecha     = document.getElementById('m_fecha')?.value;
  const linea_id  = document.getElementById('m_linea_ppto')?.value || 'modena';
  const tipo_al   = document.getElementById('m_tipo_al')?.value || 'nuevo';
  const color_al  = document.getElementById('m_color_al')?.value || 'Blanco';
  const precio_kg = parseFloat(document.getElementById('m_precio_kg')?.value) || 0;
  const linea     = state.lineas.find(l => l.id === linea_id);
  if (!cliente || !obra) { toast('Completá cliente y obra', 'error'); return; }
  const p = { id: genId(), cliente, obra, fecha, estado: 'generado', markup: 30, total_final: 0, kanban_col: '', linea_id, linea: linea?.nombre || linea_id, tipo_al, color_al, precio_kg };
  state.presupuestos.unshift(p);
  await sheetsAppend(SHEETS.presupuestos, p);
  closeModal();
  state.presupuestoActivo = p.id;
  state._tab = 'aberturas';
  toast('Presupuesto creado');
  render();
}

function updateTipos() {
  const linea = document.getElementById('m_linea')?.value;
  const tipos = TIPOS_ABERTURA[linea] || [];
  const sel = document.getElementById('m_tipo');
  if (!sel) return;
  sel.innerHTML = tipos.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
  updateParams();
}

function updateParams() {
  const linea = document.getElementById('m_linea')?.value;
  const tipoId = document.getElementById('m_tipo')?.value;
  const tipos = TIPOS_ABERTURA[linea] || [];
  const tipo = tipos.find(t => t.id === tipoId);
  const wrap = document.getElementById('m_params');
  if (!wrap || !tipo) return;
  wrap.innerHTML = (tipo.params || []).map(p => `
    <div class="form-group">
      <label>${p.nombre}</label>
      <input type="number" id="param_${p.id}" value="${p.default}" min="${p.min}" max="${p.max}" style="width:100px" oninput="previewCalc()">
    </div>`).join('');
  previewCalc();
}

function getPrecioKgPresupuesto(p) {
  let precioKg = Number(p?.precio_kg) || 0;
  if (!precioKg && p) {
    const match = state.precios_kg.find(pk =>
      pk.linea_id === p.linea_id &&
      pk.tipo === p.tipo_al &&
      pk.nombre === p.color_al
    );
    precioKg = Number(match?.precio_kg) || 0;
  }
  return precioKg;
}

function previewCalc() {
  const linea  = document.getElementById('m_linea')?.value;
  const tipoId = document.getElementById('m_tipo')?.value;
  const W      = parseInt(document.getElementById('m_ancho')?.value);
  const H      = parseInt(document.getElementById('m_alto')?.value);
  const cant   = parseInt(document.getElementById('m_cant')?.value) || 1;
  const pVid   = parseFloat(document.getElementById('m_pvid')?.value) || 8500;
  const preview = document.getElementById('m_preview');
  const btnAb   = document.getElementById('btnAgregarAb');
  if (!preview) return;
  if (!W || !H || !linea || !tipoId) { preview.innerHTML = ''; if (btnAb) btnAb.disabled = true; return; }

  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  const precioKg = getPrecioKgPresupuesto(p);

  // Obtener barras existentes del presupuesto actual
  const absExistentes = state.aberturas.filter(a => a.presupuesto_id === state.presupuestoActivo);
  const barrasExistentes = getBarrasExistentes(absExistentes, state.perfiles);

  const tipos = TIPOS_ABERTURA[linea] || [];
  const tipo  = tipos.find(t => t.id === tipoId);
  if (!tipo) return;

  const params = {};
  (tipo.params || []).forEach(pa => { params[pa.id] = parseInt(document.getElementById(`param_${pa.id}`)?.value) || pa.default; });

  const res = calcularAbertura(linea, tipoId, W, H, params, state.perfiles, state.herrajes, pVid, precioKg, barrasExistentes);
  if (!res) return;

  const hayAhorro = res.optimizacion.some(o => o.esAhorro || o.cantBarras < (o.cantBarrasTotal - o.barrasAnteriores));

  const filas = res.optimizacion.map(o => {
    const barrasNuevas = o.cantBarras;
    const esAhorro = barrasNuevas === 0;
    const colorCosto = esAhorro ? '#00E5A0' : 'var(--text)';
    const iconoAhorro = esAhorro ? '<span style="color:#00E5A0;font-size:10px;margin-left:6px;">✓ aprovecha sobrante</span>' : '';
    return `<div class="preview-row">
      <span>${o.perfil.codigo ? '['+o.perfil.codigo+'] ' : ''}${o.perfil.nombre}${iconoAhorro}</span>
      <span style="color:var(--text3)">${barrasNuevas} tira${barrasNuevas!==1?'s':''} nueva${barrasNuevas!==1?'s':''} × ${o.pesoTira}kg = ${(barrasNuevas*o.pesoTira).toFixed(2)}kg</span>
      <span style="color:${colorCosto}">${fmt(o.costo)}</span>
    </div>`;
  }).join('');

  const vidFilas = res.vidrios.map(v => `
    <div class="preview-row">
      <span>${v.desc} (${v.ancho}x${v.alto}mm)</span>
      <span style="color:var(--text3)">${((v.ancho/1000)*(v.alto/1000)).toFixed(2)}m²</span>
      <span>${fmt((v.ancho/1000)*(v.alto/1000)*pVid)}</span>
    </div>`).join('');

  const total = (res.costoPerfiles + res.costoVidrios + res.costoHerrajes) * cant;
  const ahorroHtml = hayAhorro
    ? `<div style="font-size:11px;color:#00E5A0;margin-top:6px;padding:6px 10px;background:#00E5A011;border-radius:6px;">
        ✓ Algunas barras se aprovechan de aberturas anteriores del presupuesto
       </div>`
    : '';

  preview.innerHTML = `
    <div class="preview-box">
      <div class="preview-title">Vista previa · ${fmt(precioKg)}/kg</div>
      ${filas}${vidFilas}
      ${ahorroHtml}
      <div class="preview-total"><span>Total x ${cant} u.</span><span>${fmt(total)}</span></div>
    </div>`;
  if (btnAb) btnAb.disabled = false;
}

async function confirmarAgregarAbertura() {
  const linea_id = document.getElementById('m_linea')?.value;
  const tipoId   = document.getElementById('m_tipo')?.value;
  const W        = parseInt(document.getElementById('m_ancho')?.value);
  const H        = parseInt(document.getElementById('m_alto')?.value);
  const cant     = parseInt(document.getElementById('m_cant')?.value) || 1;
  const pVid     = parseFloat(document.getElementById('m_pvid')?.value) || 8500;
  if (!W || !H) return;

  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  const precioKg = getPrecioKgPresupuesto(p);

  const tipos = TIPOS_ABERTURA[linea_id] || [];
  const tipo = tipos.find(t => t.id === tipoId);
  const params = {};
  (tipo?.params || []).forEach(pa => { params[pa.id] = parseInt(document.getElementById(`param_${pa.id}`)?.value) || pa.default; });

  // Obtener barras existentes del presupuesto para bin packing consolidado
  const absExistentes = state.aberturas.filter(a => a.presupuesto_id === state.presupuestoActivo);
  const barrasExistentes = getBarrasExistentes(absExistentes, state.perfiles);

  const res = calcularAbertura(linea_id, tipoId, W, H, params, state.perfiles, state.herrajes, pVid, precioKg, barrasExistentes);
  if (!res) return;

  const linea = state.lineas.find(l => l.id === linea_id);
  const ab = {
    id: genId(),
    presupuesto_id: state.presupuestoActivo,
    linea_id,
    linea: linea?.nombre || linea_id,
    tipo_id: tipoId,
    nombre: `${linea?.nombre} - ${tipo?.nombre}`,
    ancho: W, alto: H, cantidad: cant,
    params: JSON.stringify(params),
    precio_vidrio: pVid,
    precio_kg: precioKg,
    costo_perfiles: res.costoPerfiles,
    costo_vidrios:  res.costoVidrios,
    costo_herrajes: res.costoHerrajes,
    optimizacion: JSON.stringify(res.optimizacion),
    vidrios:      JSON.stringify(res.vidrios),
  };
  state.aberturas.push(ab);
  await sheetsAppend(SHEETS.aberturas, ab);
  await recalcularTotal();
  closeModal();
  toast('Abertura agregada');
  render();
}

// ============================================================
// SVG DESCRIPTIVOS POR TIPO DE ABERTURA (con proporciones reales)
// ============================================================
function svgAbertura(tipo_id, anchoMm, altoMm, maxW, maxH) {
  // Calcular dimensiones respetando la proporción real de la abertura
  maxW = maxW || 160;
  maxH = maxH || 200;
  const ratio = anchoMm / altoMm;
  let W, H;
  if (ratio >= 1) {
    // Más ancha que alta
    W = maxW;
    H = Math.round(maxW / ratio);
    if (H > maxH) { H = maxH; W = Math.round(maxH * ratio); }
  } else {
    // Más alta que ancha (puertas, etc.)
    H = maxH;
    W = Math.round(maxH * ratio);
    if (W > maxW) { W = maxW; H = Math.round(maxW / ratio); }
  }
  // Asegurar mínimos
  W = Math.max(W, 40); H = Math.max(H, 40);

  const pad = 6;
  const iW = W - pad*2;  // interior width
  const iH = H - pad*2;  // interior height
  const cx = W/2, cy = H/2;
  const fc = '#1e3a5f';   // frame color
  const gc = '#0ea5e9';   // glass/detail color
  const gf = '#dbeafe';   // glass fill
  const sw = Math.max(2, Math.round(Math.min(W,H)/30)); // stroke adaptivo

  const label = anchoMm + 'x' + altoMm + 'mm';
  const labelY = H + 14;
  const totalH = H + 18;

  let interior = '';

  if (tipo_id === 'ventana-corrediza') {
    const mid = pad + iW/2;
    interior = ''
      // divisor central
      + '<line x1="'+mid+'" y1="'+pad+'" x2="'+mid+'" y2="'+(H-pad)+'" stroke="'+fc+'" stroke-width="'+sw+'"/>'
      // hoja izquierda (vidrio)
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5" opacity="0.8"/>'
      // hoja derecha (vidrio)
      + '<rect x="'+(mid+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5" opacity="0.8"/>'
      // flecha izquierda
      + '<line x1="'+(pad+8)+'" y1="'+cy+'" x2="'+(mid-8)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>'
      // flecha derecha
      + '<line x1="'+(mid+8)+'" y1="'+cy+'" x2="'+(W-pad-8)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>';
  }
  else if (tipo_id === 'puerta-abrir') {
    // Hoja completa
    const bx = pad+2, by = pad+2, bw = iW-4, bh = iH-4;
    // Arco de apertura (cuarto de círculo desde esquina)
    const r = Math.min(bw, bh) * 0.85;
    interior = ''
      + '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // Arco de apertura
      + '<path d="M '+(bx+bw)+' '+by+' A '+r+' '+r+' 0 0 0 '+bx+' '+(by+r)+'" fill="none" stroke="'+gc+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      // Manija
      + '<circle cx="'+(bx+bw-6)+'" cy="'+cy+'" r="3" fill="'+gc+'"/>';
  }
  else if (tipo_id === 'puerta-corrediza') {
    const mid = pad + iW/2;
    interior = ''
      // hoja frontal (más oscura)
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW/2-2)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="2"/>'
      // hoja trasera (más transparente)
      + '<rect x="'+(mid)+'" y="'+(pad+4)+'" width="'+(iW/2-2)+'" height="'+(iH-8)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1" opacity="0.4"/>'
      // flecha
      + '<line x1="'+(pad+8)+'" y1="'+cy+'" x2="'+(mid-4)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>'
      + '<circle cx="'+(mid-8)+'" cy="'+cy+'" r="3" fill="'+gc+'"/>';
  }
  else if (tipo_id === 'puerta-ventana-corrediza') {
    // Similar a ventana corrediza pero más alta — se nota en la proporción automática
    const mid = pad + iW/2;
    interior = ''
      + '<line x1="'+mid+'" y1="'+pad+'" x2="'+mid+'" y2="'+(H-pad)+'" stroke="'+fc+'" stroke-width="'+sw+'"/>'
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="2"/>'
      + '<rect x="'+(mid+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5" opacity="0.7"/>'
      // Manija en hoja izquierda
      + '<circle cx="'+(mid-8)+'" cy="'+cy+'" r="4" fill="'+gc+'"/>'
      // Flecha deslizamiento
      + '<line x1="'+(pad+10)+'" y1="'+cy+'" x2="'+(mid-14)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>';
  }
  else if (tipo_id === 'pano-fijo') {
    interior = ''
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // Cruces decorativas (reflexión de luz)
      + '<line x1="'+(pad+6)+'" y1="'+(pad+6)+'" x2="'+(W-pad-6)+'" y2="'+(H-pad-6)+'" stroke="'+gc+'" stroke-width="1" opacity="0.3"/>'
      + '<line x1="'+(W-pad-6)+'" y1="'+(pad+6)+'" x2="'+(pad+6)+'" y2="'+(H-pad-6)+'" stroke="'+gc+'" stroke-width="1" opacity="0.3"/>';
  }
  else if (tipo_id === 'ventana-abrir') {
    const bx = pad+2, by = pad+2, bw = iW-4, bh = iH-4;
    const r = Math.min(bw, bh) * 0.8;
    interior = ''
      + '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // Arco apertura desde abajo
      + '<path d="M '+bx+' '+(by+bh)+' A '+r+' '+r+' 0 0 1 '+(bx+r)+' '+by+'" fill="none" stroke="'+gc+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      + '<circle cx="'+(bx+bw-6)+'" cy="'+cy+'" r="3" fill="'+gc+'"/>';
  }
  else if (tipo_id === 'banderola') {
    const midY = pad + iH * 0.4;
    interior = ''
      // parte superior (banderola que abre)
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW-4)+'" height="'+(midY-pad-2)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // arco de apertura
      + '<path d="M '+(pad+2)+' '+(pad+2)+' L '+cx+' '+midY+' L '+(W-pad-2)+' '+(pad+2)+'" fill="none" stroke="'+gc+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      // parte inferior (fijo)
      + '<rect x="'+(pad+2)+'" y="'+(midY+2)+'" width="'+(iW-4)+'" height="'+(H-pad-midY-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1" opacity="0.5"/>';
  }
  else {
    interior = '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>';
  }

  return '<svg width="'+W+'" height="'+totalH+'" viewBox="0 0 '+W+' '+totalH+'" xmlns="http://www.w3.org/2000/svg">'
    // Marco exterior
    + '<rect x="0" y="0" width="'+W+'" height="'+H+'" rx="2" fill="#f8fafc" stroke="'+fc+'" stroke-width="'+sw+'"/>'
    + interior
    // Etiqueta de medidas
    + '<text x="'+cx+'" y="'+(totalH-2)+'" text-anchor="middle" font-size="9" fill="'+fc+'" font-family="monospace" font-weight="600">'+label+'</text>'
    + '</svg>';
}

// Convierte SVG a PNG data URI via Canvas (para Word)
function svgToPngDataUri(tipo_id, anchoMm, altoMm) {
  return new Promise((resolve) => {
    const svg = svgAbertura(tipo_id, anchoMm, altoMm, 120, 160);
    const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width || 120;
      canvas.height = img.height || 175;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(''); };
    img.src = url;
  });
}
