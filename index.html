<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlumPro — Gestión de Aberturas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F1E;
    --surface: #111827;
    --surface2: #1A2438;
    --border: #1E2D45;
    --border2: #263548;
    --accent: #00E5A0;
    --accent2: #0066FF;
    --text: #F0F4FF;
    --text2: #8899BB;
    --text3: #4A5A7A;
    --danger: #FF4D6A;
    --warning: #FFB830;
    --info: #2B8EFF;
    --success: #00E5A0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .header-nav { display: flex; gap: 4px; }
  .hamburger { display: none; background: transparent; border: none; cursor: pointer; color: var(--text2); padding: 6px; }
  .mobile-menu { display: none; position: fixed; inset: 0; top: 56px; background: var(--bg); z-index: 99; flex-direction: column; padding: 16px; gap: 4px; }
  .mobile-menu.open { display: flex; }
  .mobile-nav-btn { padding: 14px 18px; background: transparent; border: none; color: var(--text2); cursor: pointer; font-size: 15px; font-family: 'DM Sans', sans-serif; border-radius: 10px; font-weight: 500; text-align: left; border-bottom: 1px solid var(--border); }
  .mobile-nav-btn:hover, .mobile-nav-btn.active { background: var(--surface2); color: var(--accent); }
  @media (max-width: 600px) {
    .header-nav { display: none; }
    .hamburger { display: flex; }
    main { padding: 20px 14px; }
    .card-grid { grid-template-columns: 1fr; }
    .page-header { flex-direction: column; gap: 10px; }
    .detail-header { flex-direction: column; }
    .kanban-board { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; }
  }
  .nav-btn {
    padding: 7px 16px; background: transparent; border: none; color: var(--text2);
    cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
    border-radius: 8px; font-weight: 500; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--surface2); color: var(--accent); font-weight: 600; }
  .back-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: transparent; border: 1px solid var(--border2); color: var(--text2);
    cursor: pointer; font-size: 13px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { border-color: var(--text3); color: var(--text); }

  /* LAYOUT */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* BUTTONS */
  .btn-primary {
    padding: 10px 22px; background: var(--accent); color: #0A0F1E;
    border: none; border-radius: 9px; font-weight: 700; cursor: pointer;
    font-size: 14px; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-loading { position: relative; pointer-events: none; opacity: 0.75; }
  .btn-loading::after { content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #0A0F1E; border-radius: 50%; animation: spin 0.6s linear infinite; }
  .btn-secondary {
    padding: 10px 22px; background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 9px; font-weight: 500;
    cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif;
  }
  .btn-secondary:hover { border-color: var(--text3); color: var(--text); }
  .btn-danger {
    padding: 6px 14px; background: transparent; color: var(--danger);
    border: 1px solid var(--danger)44; border-radius: 7px; font-size: 12px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-icon { background: transparent; border: none; cursor: pointer; padding: 4px; color: var(--text3); font-size: 16px; }
  .btn-icon:hover { color: var(--text); }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .form-row .form-group { flex: 1; min-width: 140px; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, textarea {
    width: 100%; padding: 10px 14px; background: var(--bg);
    border: 1px solid var(--border2); border-radius: 8px; color: var(--text);
    font-size: 14px; outline: none; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input[type=number] { font-family: 'DM Mono', monospace; }
  select option { background: var(--surface); }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card-clickable { cursor: pointer; }
  .card-clickable:hover { border-color: var(--accent)44; transform: translateY(-1px); }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }

  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; transition: all 0.15s; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 64px 24px; }
  .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.5; }
  .empty p { color: var(--text3); font-size: 15px; margin-bottom: 20px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; color: var(--text3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 22px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast-msg { padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; animation: slideIn 0.2s ease; }
  .toast-success { background: var(--accent); color: #0A0F1E; }
  .toast-error { background: var(--danger); color: #fff; }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LOADER */
  .loader { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--text3); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* PAGE HEADER */
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
  .page-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

  /* PRESUPUESTO DETAIL */
  .detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 14px; }
  .detail-cliente { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .detail-obra { font-size: 14px; color: var(--text3); margin-top: 3px; }
  .detail-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ABERTURA CARD */
  .ab-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .ab-nombre { font-size: 15px; font-weight: 600; }
  .ab-meta { font-size: 12px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .ab-costo { font-size: 16px; font-weight: 700; color: var(--accent); text-align: right; }

  /* PREVIEW */
  .preview-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin: 14px 0; }
  .preview-title { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .preview-row { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; font-size: 13px; color: var(--text2); padding: 5px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; }
  .preview-row:last-child { border-bottom: none; }
  .preview-total { display: grid; grid-template-columns: 1fr auto; gap: 14px; font-size: 14px; font-weight: 700; color: var(--accent); padding: 10px 0 0; margin-top: 6px; border-top: 1px solid var(--border2); }

  /* RESUMEN */
  .resumen-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--text2); padding: 10px 0; border-bottom: 1px solid var(--border); }
  .total-final { display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-radius: 10px; padding: 16px 20px; margin-top: 16px; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }

  /* MATERIAL ROW */
  .mat-row { display: grid; grid-template-columns: 1fr auto auto; gap: 16px; align-items: center; background: var(--surface2); border-radius: 9px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); }
  .mat-nombre { font-size: 14px; font-weight: 500; }
  .mat-barras { display: flex; gap: 8px; align-items: center; }
  .mat-badge { background: var(--accent)22; color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .mat-costo { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; text-align: right; }

  /* AGREGAR ABERTURA */
  .add-ab-wrap { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 24px; margin-top: 12px; }
  .add-ab-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .btn-add-ab { width: 100%; padding: 14px; background: transparent; border: 2px dashed var(--border2); border-radius: 12px; color: var(--text3); cursor: pointer; font-size: 14px; margin-top: 12px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-add-ab:hover { border-color: var(--accent)55; color: var(--accent); }

  /* KANBAN */
  .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
  .kanban-col { flex: 0 0 280px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .kanban-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .kanban-count { background: var(--surface2); color: var(--text3); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .kanban-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .kanban-card:hover { border-color: var(--border2); }
  .kanban-card-cliente { font-size: 14px; font-weight: 600; }
  .kanban-card-obra { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .kanban-card-total { font-size: 13px; color: var(--accent); font-weight: 700; margin-top: 10px; font-family: 'DM Mono', monospace; }
  .kanban-move { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .kanban-move button { padding: 4px 10px; background: transparent; border: 1px solid var(--border2); color: var(--text3); border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .kanban-move button:hover { border-color: var(--accent)55; color: var(--accent); }

  /* STOCK */
  .stock-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 16px; align-items: center; background: var(--surface2); border-radius: 9px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border); }

  /* CONFIG */
  .config-section { margin-bottom: 32px; }
  .config-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text2); display: flex; align-items: center; gap: 10px; }
  .config-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div class="logo-text">Alum<span>Pro</span></div>
  </div>
  <nav class="header-nav" id="mainNav">
    <button class="nav-btn active" onclick="navigate('presupuestos')">Presupuestos</button>
    <button class="nav-btn" onclick="navigate('kanban')">Kanban de Obras</button>
    <button class="nav-btn" onclick="navigate('stock')">Stock</button>
    <button class="nav-btn" onclick="navigate('config')">Configuracion</button>
  </nav>
  <button class="hamburger" onclick="toggleMobileMenu()" id="hamburgerBtn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</header>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-nav-btn active" onclick="navigate('presupuestos');toggleMobileMenu()">📋 Presupuestos</button>
  <button class="mobile-nav-btn" onclick="navigate('kanban');toggleMobileMenu()">📌 Kanban de Obras</button>
  <button class="mobile-nav-btn" onclick="navigate('stock');toggleMobileMenu()">📦 Stock</button>
  <button class="mobile-nav-btn" onclick="navigate('config');toggleMobileMenu()">⚙️ Configuracion</button>
</div>

<main id="appRoot">
  <div class="loader"><div class="spinner"></div> Cargando datos...</div>
</main>

<script>
// ============================================================
// CONFIG APPS SCRIPT
// ============================================================
const SCRIPT_URL = '/api/proxy';

const SHEETS = {
  presupuestos: 'Presupuestos',
  aberturas:    'Aberturas',
  lineas:       'Lineas',
  perfiles:     'Perfiles',
  herrajes:     'Herrajes',
  stock:        'Stock',
  precios_kg:   'PreciosKg',
  config:       'Config',
};

// ============================================================
// SHEETS API (via Apps Script)
// ============================================================
async function sheetsGet(sheetName) {
  try {
    const url = `${SCRIPT_URL}?action=get&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    const json = await res.json();
    return json.ok ? json.data : [];
  } catch(e) { console.error('sheetsGet error', e); return []; }
}

async function sheetsAppend(sheetName, rowObj) {
  try {
    const url = `${SCRIPT_URL}?action=append&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(rowObj)
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
  } catch(e) { console.error('sheetsAppend error', e); throw e; }
}

async function sheetsUpdateRow(sheetName, id, updates) {
  try {
    const url = `${SCRIPT_URL}?action=update&sheet=${encodeURIComponent(sheetName)}&id=${encodeURIComponent(id)}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
  } catch(e) { console.error('sheetsUpdateRow error', e); }
}

async function sheetsDeleteRow(sheetName, id) {
  try {
    const url = `${SCRIPT_URL}?action=delete&sheet=${encodeURIComponent(sheetName)}&id=${encodeURIComponent(id)}`;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
  } catch(e) { console.error('sheetsDeleteRow error', e); }
}

// ============================================================
// UTILS
// ============================================================
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(n) { return '$' + Math.round(Number(n) || 0).toLocaleString('es-AR'); }
function today() { return new Date().toLocaleDateString('es-AR'); }

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-msg toast-${type}`;
  el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
// ESTADO GLOBAL
// ============================================================
let state = {
  vista: 'presupuestos',
  presupuestos: [],
  aberturas: [],
  lineas: [],
  perfiles: [],
  herrajes: [],
  stock: [],
  precios_kg: [],
  config_tipologias: {},
  tipologias_custom: [], // { id, linea_id, nombre, con_hojas, hojas_min, hojas_max, hojas_default }
  umbral_sobrante: 20, // % máximo de sobrante que se cobra (default 20%)
  presupuestoActivo: null,
  loading: false,
  _tab: 'aberturas',
  _configTab: 'precios',
};

// ============================================================
// DATOS INICIALES
// ============================================================
const LINEAS_DEFAULT = [
  { id: 'modena', nombre: 'Modena' },
];

// Perfiles Modena con código real y peso por tira (kg) - barra siempre 6000mm
const PERFILES_DEFAULT = [
  { id: '5200', linea_id: 'modena', codigo: '5200', nombre: 'Zócalo y Cabezal de Marco',      largo_barra: 6000, peso_tira: 8    },
  { id: '5201', linea_id: 'modena', codigo: '5201', nombre: 'Jamba Lateral',                  largo_barra: 6000, peso_tira: 4.2  },
  { id: '5204', linea_id: 'modena', codigo: '5204', nombre: 'Zócalo y Cabezal de Hoja N°2',   largo_barra: 6000, peso_tira: 4    },
  { id: '5203', linea_id: 'modena', codigo: '5203', nombre: 'Parante Lateral N°3',             largo_barra: 6000, peso_tira: 3.66 },
  { id: '5207', linea_id: 'modena', codigo: '5207', nombre: 'Parante Central',                 largo_barra: 6000, peso_tira: 4    },
  { id: '5249', linea_id: 'modena', codigo: '5249', nombre: 'Zócalo y Cabezal DVH',            largo_barra: 6000, peso_tira: 4    },
  { id: '5248', linea_id: 'modena', codigo: '5248', nombre: 'Parante Lateral DVH',             largo_barra: 6000, peso_tira: 3.83 },
  { id: '5250', linea_id: 'modena', codigo: '5250', nombre: 'Parante Central DVH',             largo_barra: 6000, peso_tira: 3.83 },
  { id: '5209', linea_id: 'modena', codigo: '5209', nombre: 'Zócalo Alto',                     largo_barra: 6000, peso_tira: 5    },
  { id: '5252', linea_id: 'modena', codigo: '5252', nombre: 'Zócalo Alto DVH',                 largo_barra: 6000, peso_tira: 6.5  },
  { id: '5216', linea_id: 'modena', codigo: '5216', nombre: 'Marco Paño Fijo / de Abrir',      largo_barra: 6000, peso_tira: 4.5  },
  { id: '5221', linea_id: 'modena', codigo: '5221', nombre: 'Travesaño Paño Fijo',             largo_barra: 6000, peso_tira: 4    },
  { id: '5230', linea_id: 'modena', codigo: '5230', nombre: 'Contravidrio Curvo',              largo_barra: 6000, peso_tira: 1.3  },
  { id: '5235', linea_id: 'modena', codigo: '5235', nombre: 'Hoja de Abrir Curva',             largo_barra: 6000, peso_tira: 4.8  },

// Obtiene los cortes raw de una abertura sin calcular costos
function getCortesRaw(linea_id, tipo_id, W, H, params, perfilesDB) {
  const perfilesFiltrados = perfilesDB.filter(p => p.linea_id === linea_id);
  const N = Number(params?.hojas) || 1;
  const cfg = getConfigTipo(linea_id, tipo_id);
  // Si hay config (custom o editada), siempre usarla
  if (cfg && cfg.perfiles && cfg.perfiles.length > 0) {
    return cfg.perfiles
      .filter(pf => !pf.solo_si_n || String(pf.solo_si_n) === String(N))
      .map(pf => {
        const perfil = perfilesFiltrados.find(p => p.codigo === pf.codigo || p.id === pf.codigo);
        if (!perfil) return null;
        let cantNum = 1;
        try { cantNum = Math.round(Function('N','return '+pf.cantidad)(N)); } catch {}
        const largoNum = evalFormula(pf.formula_largo, W, H, N);
        return { perfil, cantidad: cantNum, largo: largoNum, desc: pf.rol };
      }).filter(Boolean);
  }
  // Fallback: función hardcodeada (solo tipos built-in)
  const tipos = TIPOS_ABERTURA[linea_id];
  if (!tipos) return [];
  const tipo = tipos.find(t => t.id === tipo_id);
  if (!tipo) return [];
  return tipo.cortes(W, H, params, perfilesFiltrados);
}

// Bin packing First Fit Decreasing sobre una lista de piezas con barras ya existentes
// existingBarras: { [perfilKey]: [{ piezas, resto }] } — barras ya usadas por aberturas anteriores
// Devuelve { resultado, barrasFinales }
function optimizarCortesConSobrantes(cortesAgrupados, perfilesDB, precioKg, existingBarras) {
  existingBarras = existingBarras || {};
  const resultado = [];
  // Clonar barras existentes para no mutarlas
  const barrasActuales = {};
  for (const [k, barras] of Object.entries(existingBarras)) {
    barrasActuales[k] = barras.map(b => ({ piezas: [...b.piezas], resto: b.resto }));
  }

  for (const [perfilId, piezas] of Object.entries(cortesAgrupados)) {
    const perfil = perfilesDB.find(p => p.id === perfilId || p.codigo === perfilId);
    if (!perfil) continue;

    const lista = [];
    for (const p of piezas) for (let i = 0; i < p.cantidad; i++) lista.push({ largo: Number(p.largo), desc: p.desc });
    lista.sort((a, b) => b.largo - a.largo);

    // Usar barras existentes de este perfil como punto de partida
    const barras = barrasActuales[perfilId] || [];
    const barrasNuevas = []; // solo las barras nuevas que se necesitan para esta abertura
    let barrasAntesDeEstaAbertura = barras.length;

    for (const pieza of lista) {
      let ok = false;
      // Primero intentar en barras ya existentes (sobrantes)
      for (const b of barras) {
        if (b.resto >= pieza.largo) {
          b.piezas.push({ ...pieza, esAhorro: true });
          b.resto -= pieza.largo;
          ok = true;
          break;
        }
      }
      // Si no entró, abrir barra nueva
      if (!ok) {
        const nuevaBarra = { piezas: [pieza], resto: Number(perfil.largo_barra) - pieza.largo, nueva: true };
        barras.push(nuevaBarra);
        barrasNuevas.push(nuevaBarra);
      }
    }

    barrasActuales[perfilId] = barras;

    const pesoTira = Number(perfil.peso_tira) || 0;
    const costoPorBarra = pesoTira * precioKg;
    // Solo se cobran las barras NUEVAS que necesitó esta abertura
    const costoTotal = barrasNuevas.length * costoPorBarra;
    const esAhorro = barrasNuevas.length === 0; // todas las piezas entraron en sobrantes

    resultado.push({
      perfil,
      barras: barrasNuevas,
      barrasTotal: barras,
      cantBarras: barrasNuevas.length,
      cantBarrasTotal: barras.length,
      barrasAnteriores: barrasAntesDeEstaAbertura,
      pesoTira,
      costoPorBarra,
      costo: costoTotal,
      esAhorro,
    });
  }

  return { resultado, barrasFinales: barrasActuales };
}

// Versión simple (sin sobrantes) — para compatibilidad
function optimizarCortes(cortesAgrupados, perfilesDB, precioKg) {
  return optimizarCortesConSobrantes(cortesAgrupados, perfilesDB, precioKg, {}).resultado;
}

// Construye el mapa de barras existentes a partir de las aberturas ya guardadas en el presupuesto
function getBarrasExistentes(absExistentes, perfilesDB) {
  const barrasMap = {};
  for (const a of absExistentes) {
    const opts = Array.isArray(a.optimizacion) ? a.optimizacion : tryParse(a.optimizacion, []);
    for (const opt of opts) {
      const perfil = opt.perfil || {};
      const k = perfil.codigo || perfil.id || opt.perfil_id || '';
      if (!k) continue;
      const largoBarra = Number(perfil.largo_barra || 6000);
      if (!barrasMap[k]) barrasMap[k] = [];
      // Reconstruir barras desde el detalle guardado
      const barras = opt.barras || opt.barrasTotal || [];
      for (const b of barras) {
        barrasMap[k].push({
          piezas: (b.piezas || []).map(pz => ({ ...pz })),
          resto: Number(b.resto || 0),
        });
      }
    }
  }
  return barrasMap;
}


function calcularAbertura(linea_id, tipo_id, W, H, params, perfilesDB, herrajesDB, precioVidrio, precioKg, barrasExistentes) {
  const tipos = TIPOS_ABERTURA[linea_id];
  if (!tipos) return null;
  const tipo = tipos.find(t => t.id === tipo_id);
  if (!tipo) return null;
  const perfilesFiltrados = perfilesDB.filter(p => p.linea_id === linea_id);
  const N = Number(params.hojas) || 1;
  const cfg = getConfigTipo(linea_id, tipo_id);

  const cortesRaw = getCortesRaw(linea_id, tipo_id, W, H, params, perfilesDB);

  // Vidrios — formula de config si existe, sino hardcoded (solo built-in), sino vacío
  let vidrios;
  if (cfg && cfg.vidrio && cfg.vidrio.formula_ancho && cfg.vidrio.formula_alto) {
    const vAncho = evalFormula(cfg.vidrio.formula_ancho, W, H, N);
    const vAlto  = evalFormula(cfg.vidrio.formula_alto,  W, H, N);
    vidrios = Array.from({ length: N }, (_, i) => ({ desc: 'Vidrio hoja ' + (i+1), ancho: vAncho, alto: vAlto }));
  } else if (tipo && typeof tipo.vidrios === 'function') {
    vidrios = tipo.vidrios(W, H, params);
  } else {
    vidrios = [];
  }

  const agrupados = {};
  for (const c of cortesRaw) {
    if (!c.perfil) continue;
    const key = c.perfil.codigo || c.perfil.id;
    if (!agrupados[key]) agrupados[key] = [];
    agrupados[key].push({ largo: c.largo, cantidad: c.cantidad, desc: c.desc });
  }

  const { resultado: optimizacion, barrasFinales } = optimizarCortesConSobrantes(
    agrupados, perfilesFiltrados, precioKg, barrasExistentes || {}
  );

  const costoPerfiles = optimizacion.reduce((s, o) => s + o.costo, 0);
  const costoVidrios = vidrios.reduce((s, v) => s + (v.ancho / 1000) * (v.alto / 1000) * precioVidrio, 0);
  const herrajesCalc = getHerrajesTipo(linea_id, tipo_id, params);
  const herrajesFiltrados = herrajesDB.filter(h => h.linea_id === linea_id);
  const costoHerrajes = herrajesCalc.reduce((s, h) => {
    const hObj = herrajesFiltrados.find(x => x.id === h.id);
    return s + (hObj ? Number(hObj.precio) * h.cantidad : 0);
  }, 0);
  return { optimizacion, vidrios, costoPerfiles, costoVidrios, costoHerrajes, barrasFinales };
}

// ============================================================
// CÁLCULO DE PRECIO POR ABERTURA
// criterio: 'proporcional' | 'barra_completa'
// ============================================================
function calcularCostoAberturas(abs, perfilesDB, herrajesDB, precioKg, criterio, umbralSobrante) {
  criterio = criterio || 'proporcional';
  umbralSobrante = umbralSobrante !== undefined ? Number(umbralSobrante) : 20;

  // Paso 1: bin packing consolidado
  let barrasAcum = {};
  const herrajesDetalleMap = {};

  for (const a of abs) {
    const cant = Number(a.cantidad) || 1;
    const params = tryParse(a.params, {});
    // Usar perfiles_snap si existe (precio congelado), sino perfilesDB actual
    const perfilesEfectivos = (a.perfiles_snap && a.perfiles_snap.length) ? a.perfiles_snap : perfilesDB.filter(pf => pf.linea_id === a.linea_id);
    const precioKgEfectivo = Number(a.precio_kg) || precioKg;
    const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, perfilesEfectivos.length ? perfilesEfectivos : perfilesDB);
    const perfilesFiltrados = perfilesEfectivos.length ? perfilesEfectivos : perfilesDB.filter(pf => pf.linea_id === a.linea_id);
    const agrupados = {};
    for (const c of cortesRaw) {
      if (!c.perfil) continue;
      const key = c.perfil.codigo || c.perfil.id;
      if (!agrupados[key]) agrupados[key] = [];
      agrupados[key].push({ largo: c.largo, cantidad: c.cantidad * cant, desc: c.desc });
    }
    const { barrasFinales } = optimizarCortesConSobrantes(agrupados, perfilesFiltrados, precioKgEfectivo, barrasAcum);
    barrasAcum = barrasFinales;

    // Herrajes — usar herrajes_snap si existe (precio congelado), sino config/DB actual
    let herrajesDetalleArr;
    if (a.herrajes_snap && a.herrajes_snap.length) {
      herrajesDetalleArr = a.herrajes_snap.map(h => ({
        nombre: h.nombre,
        cantidad: h.cantidad * cant,
        precioUnit: Number(h.precio),
        unidad: h.unidad || 'u',
        subtotal: Number(h.precio) * h.cantidad * cant,
        desc: h.nombre,
      }));
    } else {
      const herrajesCalc = getHerrajesTipo(a.linea_id, a.tipo_id, params);
      const herrajesFiltrados = herrajesDB.filter(h => h.linea_id === a.linea_id);
      herrajesDetalleArr = herrajesCalc.map(h => {
        const hObj = herrajesFiltrados.find(x => x.id === h.id);
        return {
          nombre: hObj ? hObj.nombre : (h.descripcion || h.id),
          cantidad: h.cantidad * cant,
          precioUnit: Number(hObj ? hObj.precio : 0),
          unidad: hObj ? hObj.unidad : 'u',
          subtotal: Number(hObj ? hObj.precio : 0) * h.cantidad * cant,
          desc: h.descripcion || h.desc || '',
        };
      });
    }
    herrajesDetalleMap[a.id] = herrajesDetalleArr;
  }

  // Paso 2: mm usados por abertura por perfil (multiplicado por cantidad de aberturas)
  const mmPorAb = {};
  for (const a of abs) {
    const cant = Number(a.cantidad) || 1;
    const params = tryParse(a.params, {});
    const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, perfilesDB);
    mmPorAb[a.id] = {};
    for (const c of cortesRaw) {
      if (!c.perfil) continue;
      const k = c.perfil.codigo || c.perfil.id;
      mmPorAb[a.id][k] = (mmPorAb[a.id][k] || 0) + c.largo * c.cantidad * cant;
    }
  }

  // Paso 3: inicializar costos con desglose por perfil
  const costos = {};
  for (const a of abs) {
    costos[a.id] = {
      perfiles: 0,
      perfilesPorCodigo: {}, // { perfilKey: costo }
      vidrios: 0,
      herrajes: 0,
      herrajesDetalle: herrajesDetalleMap[a.id] || [],
      sobrantesAStock: []
    };
  }

  if (criterio === 'barra_completa') {
    for (const a of abs) {
      const cant = Number(a.cantidad) || 1;
      const perfilesFiltrados = perfilesDB.filter(pf => pf.linea_id === a.linea_id);
      const params = tryParse(a.params, {});
      const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, perfilesDB);
      const perfilesUsados = [...new Set(cortesRaw.filter(c => c.perfil).map(c => c.perfil.codigo || c.perfil.id))];
      for (const k of perfilesUsados) {
        const perfil = perfilesFiltrados.find(p => p.codigo === k || p.id === k);
        if (!perfil) continue;
        const largoBarra = Number(perfil.largo_barra || 6000);
        const costoPorBarra = Number(perfil.peso_tira || 0) * precioKg;
        // Multiplicar piezas por cantidad de aberturas
        const piezas = cortesRaw
          .filter(c => c.perfil && (c.perfil.codigo === k || c.perfil.id === k))
          .flatMap(c => Array(c.cantidad * cant).fill(c.largo))
          .sort((a, b) => b - a);
        let barrasN = 0, resto = 0;
        for (const mm of piezas) {
          if (resto >= mm) { resto -= mm; } else { barrasN++; resto = largoBarra - mm; }
        }
        const costo = barrasN * costoPorBarra;
        costos[a.id].perfiles += costo;
        costos[a.id].perfilesPorCodigo[k] = (costos[a.id].perfilesPorCodigo[k] || 0) + costo;
      }
    }

  } else {
    // PROPORCIONAL: perfil por perfil, barra por barra, con umbral
    for (const [k, barras] of Object.entries(barrasAcum)) {
      const perfil = perfilesDB.find(p => p.codigo === k || p.id === k);
      if (!perfil) continue;
      const largoBarra = Number(perfil.largo_barra || 6000);
      const costoPorBarra = Number(perfil.peso_tira || 0) * precioKg;
      const precioPorMm = costoPorBarra / largoBarra;

      for (const barra of barras) {
        const mmUsados = largoBarra - (barra.resto || 0);
        const pctSobrante = ((barra.resto || 0) / largoBarra) * 100;

        // Registrar sobrante al stock
        if ((barra.resto || 0) > 50) {
          const abConPiezas = abs.find(a => (mmPorAb[a.id]?.[k] || 0) > 0);
          if (abConPiezas && costos[abConPiezas.id]) {
            const yaExiste = costos[abConPiezas.id].sobrantesAStock.some(
              s => s.perfil_id === perfil.id && s.largo_mm === Math.round(barra.resto)
            );
            if (!yaExiste) {
              costos[abConPiezas.id].sobrantesAStock.push({
                perfil_id: perfil.id,
                perfil_nombre: perfil.nombre,
                perfil_codigo: perfil.codigo,
                largo_mm: Math.round(barra.resto || 0),
              });
            }
          }
        }

        const mmTotalK = Object.values(mmPorAb).reduce((s, m) => s + (m[k] || 0), 0);

        for (const a of abs) {
          const mmEsta = mmPorAb[a.id]?.[k] || 0;
          if (mmEsta === 0) continue;
          const fraccionAb = mmTotalK > 0 ? mmEsta / mmTotalK : 0;

          let costoEste;
          if (pctSobrante <= umbralSobrante) {
            // Sobrante pequeño: paga su fracción de la barra completa
            costoEste = costoPorBarra * fraccionAb;
          } else {
            // Sobrante grande: paga solo sus mm × precio/mm
            costoEste = precioPorMm * mmUsados * fraccionAb;
          }
          costos[a.id].perfiles += costoEste;
          costos[a.id].perfilesPorCodigo[k] = (costos[a.id].perfilesPorCodigo[k] || 0) + costoEste;
        }
      }
    }
  }

  // Vidrios y herrajes
  for (const a of abs) {
    costos[a.id].vidrios = (tryParse(a.vidrios, []) || []).reduce((s, v) =>
      s + (v.ancho/1000)*(v.alto/1000)*Number(a.precio_vidrio||8500), 0);
    costos[a.id].herrajes = (herrajesDetalleMap[a.id] || []).reduce((s, h) => s + h.subtotal, 0);
  }

  return costos;
}


async function agregarSobrantesAStock(costos, abs) {
  for (const a of abs) {
    const sobrantes = costos[a.id]?.sobrantesAStock || [];
    for (const sb of sobrantes) {
      if (sb.largo_mm < 50) continue; // ignorar sobrantes muy chicos
      const linea = state.lineas.find(l => l.id === a.linea_id);
      const s = {
        id: genId(),
        perfil_id: sb.perfil_id,
        perfil_nombre: sb.perfil_nombre + (sb.perfil_codigo ? ' ['+sb.perfil_codigo+']' : ''),
        linea: linea?.nombre || a.linea_id,
        largo_mm: sb.largo_mm,
        nota: 'Sobrante automático — ' + a.nombre,
        fecha: today(),
      };
      state.stock.push(s);
      await sheetsAppend(SHEETS.stock, s);
    }
  }
}

// Obtener config activa para una tipología (usa state si fue editada, sino default)
function getConfigTipo(linea_id, tipo_id) {
  const custom = state.config_tipologias?.[linea_id]?.[tipo_id];
  const def = CONFIG_TIPOLOGIAS_DEFAULT[linea_id]?.[tipo_id];
  return custom || def || null;
}

// Obtener herrajes de una tipología: usa config editable si existe, sino hardcoded en TIPOS_ABERTURA
function getHerrajesTipo(linea_id, tipo_id, params) {
  const cfg = getConfigTipo(linea_id, tipo_id);
  const N = Number(params?.hojas) || 1;
  if (cfg && cfg.herrajes && cfg.herrajes.length > 0) {
    return cfg.herrajes
      .filter(h => !h.solo_si_n || String(h.solo_si_n) === String(N))
      .map(h => {
        let cantNum = 1;
        try { cantNum = Math.round(Function('N', 'return ' + h.cantidad)(N)); } catch {}
        return { id: h.id, cantidad: cantNum, descripcion: h.descripcion, desc: h.descripcion };
      });
  }
  // Fallback: función hardcodeada en TIPOS_ABERTURA
  const tipo = (TIPOS_ABERTURA[linea_id] || []).find(t => t.id === tipo_id);
  return tipo ? tipo.herrajes(params || {}) : [];
}

// Obtener todos los tipos de una línea: hardcoded + custom
function getTiposLinea(linea_id) {
  const base = TIPOS_ABERTURA[linea_id] || [];
  const custom = state.tipologias_custom.filter(t => t.linea_id === linea_id).map(t => ({
    id: t.id,
    nombre: t.nombre,
    isCustom: true,
    params: t.con_hojas ? [{ id: 'hojas', nombre: 'Cantidad de hojas', default: Number(t.hojas_default)||1, min: Number(t.hojas_min)||1, max: Number(t.hojas_max)||4 }] : [],
    cortes: () => [], // los cortes vienen de getCortesRaw via config
    vidrios: () => [],
    herrajes: () => [],
  }));
  return [...base, ...custom];
}

// Evaluar fórmula simple (solo operaciones con W, H, N)
function evalFormula(formula, W, H, N) {
  try {
    return Math.round(Function('W','H','N', 'return ' + formula)(W, H, N || 1));
  } catch { return 0; }
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadAll() {
  setLoading(true);
  try {
    const [presupuestos, aberturas, lineas, perfiles, herrajes, stock, precios_kg, configRows] = await Promise.all([
      sheetsGet(SHEETS.presupuestos),
      sheetsGet(SHEETS.aberturas),
      sheetsGet(SHEETS.lineas),
      sheetsGet(SHEETS.perfiles),
      sheetsGet(SHEETS.herrajes),
      sheetsGet(SHEETS.stock),
      sheetsGet(SHEETS.precios_kg),
      sheetsGet(SHEETS.config),
    ]);
    state.presupuestos = presupuestos;
    state.aberturas = aberturas.map(a => ({ ...a, params: tryParse(a.params, {}), optimizacion: tryParse(a.optimizacion, []), vidrios: tryParse(a.vidrios, []), perfiles_snap: tryParse(a.perfiles_snap, null), herrajes_snap: tryParse(a.herrajes_snap, null) }));
    state.lineas     = lineas.length     ? lineas     : LINEAS_DEFAULT;
    state.perfiles   = perfiles.length   ? perfiles   : PERFILES_DEFAULT;
    state.herrajes   = herrajes.length   ? herrajes   : HERRAJES_DEFAULT;
    state.precios_kg = precios_kg.length ? precios_kg : PRECIOS_KG_DEFAULT;
    state.stock      = stock;

    // Restaurar config de tipologías guardada
    state.config_tipologias = {};
    state.tipologias_custom = [];
    for (const row of configRows) {
      if (row.key && row.key.startsWith('tipologia_custom_meta__')) {
        // Metadatos de tipología custom: { id, linea_id, nombre, con_hojas, hojas_min, hojas_max, hojas_default }
        try { state.tipologias_custom.push(JSON.parse(row.value)); } catch {}
      } else if (row.key && row.key.startsWith('tipologia_')) {
        try {
          const parsed = JSON.parse(row.value);
          // key formato: tipologia_linea_id__tipo_id
          const parts = row.key.replace('tipologia_', '').split('__');
          const [linea_id, tipo_id] = parts;
          if (linea_id && tipo_id) {
            if (!state.config_tipologias[linea_id]) state.config_tipologias[linea_id] = {};
            state.config_tipologias[linea_id][tipo_id] = parsed;
          }
        } catch {}
      }
    }

      const umbralRow = configRows.find(r => r.key === 'umbral_sobrante');
      if (umbralRow) state.umbral_sobrante = Number(umbralRow.value) || 20;
    if (!lineas.length)     for (const l of LINEAS_DEFAULT)     await sheetsAppend(SHEETS.lineas, l);
    if (!perfiles.length)   for (const p of PERFILES_DEFAULT)   await sheetsAppend(SHEETS.perfiles, p);
    if (!herrajes.length)   for (const h of HERRAJES_DEFAULT)   await sheetsAppend(SHEETS.herrajes, h);
    if (!precios_kg.length) for (const p of PRECIOS_KG_DEFAULT) await sheetsAppend(SHEETS.precios_kg, p);
  } catch(e) { toast('Error cargando datos', 'error'); }
  setLoading(false);
  render();
}

function tryParse(val, def) { try { return val ? JSON.parse(val) : def; } catch { return def; } }
function setLoading(v) { state.loading = v; }

// RENDER PRINCIPAL
// ============================================================
function setUmbralSobrante(valor) {
  state.umbral_sobrante = Number(valor) || 20;
  // Guardar en Config del Sheet
  sheetsGet(SHEETS.config).then(rows => {
    const row = rows.find(r => r.key === 'umbral_sobrante');
    if (row) sheetsUpdateRow(SHEETS.config, row.id, { key: 'umbral_sobrante', value: String(state.umbral_sobrante) });
    else sheetsAppend(SHEETS.config, { id: genId(), key: 'umbral_sobrante', value: String(state.umbral_sobrante) });
  });
  toast('Umbral actualizado');
}

function setCriterioPrecio(valor) {
  state._criterioPrecio = valor;
  render();
}

function setBtnLoading(btn, loading, textoOriginal) {
  if (!btn) return;
  if (loading) {
    btn.dataset.originalText = btn.textContent;
    btn.textContent = textoOriginal || 'Procesando...';
    btn.classList.add('btn-loading');
    btn.disabled = true;
  } else {
    btn.textContent = btn.dataset.originalText || btn.textContent;
    btn.classList.remove('btn-loading');
    btn.disabled = false;
  }
}

function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  if (menu) menu.classList.toggle('open');
}

function attachEvents() {}

function render() {
  const root = document.getElementById('appRoot');
  if (state.loading) { root.innerHTML = '<div class="loader"><div class="spinner"></div> Cargando...</div>'; return; }
  if (state.vista === 'presupuestos' && !state.presupuestoActivo) root.innerHTML = renderLista();
  else if (state.vista === 'presupuestos' && state.presupuestoActivo) root.innerHTML = renderDetalle();
  else if (state.vista === 'kanban') root.innerHTML = renderKanban();
  else if (state.vista === 'stock') root.innerHTML = renderStock();
  else if (state.vista === 'config') root.innerHTML = renderConfig();
  attachEvents();
}

          <div style="font-size:16px;font-weight:700;font-family:'Syne',sans-serif">${p.cliente}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:2px">${p.obra}</div>
        </div>
        ${estadoBadge(p.estado)}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text3)">${abs.length} abertura${abs.length!==1?'s':''}</span>
        <span style="font-size:17px;font-weight:800;color:var(--accent);font-family:'DM Mono',monospace">${total}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${p.fecha}</div>
          ${p.estado === 'generado' ? `<button onclick="event.stopPropagation();eliminarPresupuesto('${p.id}')" style="display:flex;align-items:center;gap:4px;padding:4px 10px;background:transparent;border:1px solid var(--danger)44;border-radius:7px;color:var(--danger);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;opacity:0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Eliminar
          </button>` : ''}
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="event.stopPropagation();imprimirPresupuesto('${p.id}')" style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text3);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text3)'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            PDF
          </button>
          <button onclick="event.stopPropagation();exportarWord('${p.id}')" style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text3);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;" onmouseover="this.style.borderColor='#2B8EFF';this.style.color='#2B8EFF'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text3)'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Word
          </button>
        </div>
      </div>
    </div>`;
  }).join('') : `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📋</div><p>No hay presupuestos todavía</p></div>`;

  return `
  <div class="page-header">
    <div>
      <div class="page-title">Presupuestos</div>
      <div class="page-sub">${ps.length} presupuesto${ps.length!==1?'s':''}</div>
    </div>
    <button class="btn-primary" onclick="showModalNuevoPresupuesto()">+ Nuevo presupuesto</button>
  </div>
  <div class="card-grid">${cards}</div>`;
}

// ============================================================
// DETALLE PRESUPUESTO
// ============================================================
function renderDetalle() {
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (!p) return '<p>No encontrado</p>';
  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
  const tab = state._tab || 'aberturas';

  // Calcular costos en tiempo real usando calcularCostoAberturas (respeta cantidad)
  const precioKgHeader = getPrecioKgPresupuesto(p);
  const costosHeader = calcularCostoAberturas(abs, state.perfiles, state.herrajes, precioKgHeader, 'proporcional', state.umbral_sobrante);
  const costoP = Object.values(costosHeader).reduce((s, c) => s + c.perfiles, 0);
  const costoV = Object.values(costosHeader).reduce((s, c) => s + c.vidrios, 0);
  const costoH = Object.values(costosHeader).reduce((s, c) => s + c.herrajes, 0);
  const subtotal = costoP + costoV + costoH;
  const markup = Number(p.markup || 0);
  const totalFinal = subtotal * (1 + markup / 100);

  const estadoOpts = ESTADOS.map(e => `<option value="${e.id}" ${p.estado===e.id?'selected':''}>${e.label}</option>`).join('');

  let tabContent = '';
  if (tab === 'aberturas') {
    const pres = state.presupuestos.find(x => x.id === state.presupuestoActivo);
    const precioKg = getPrecioKgPresupuesto(pres);
    const criterio = state._criterioPrecio || 'proporcional';
    const costos = calcularCostoAberturas(abs, state.perfiles, state.herrajes, precioKg, criterio, state.umbral_sobrante);

    const abCards = abs.map((a, idx) => {
      const c = costos[a.id] || { perfiles: 0, vidrios: 0, herrajes: 0, herrajesDetalle: [] };
      // calcularCostoAberturas ya devuelve el costo total para las N unidades (bin packing con cant*piezas)
      const cTotal = c.perfiles + c.vidrios + c.herrajes;
      // Herrajes editables inline — usan snap si existe, sino calculados
      const herrajesSnap = tryParse(a.herrajes_snap, null);
      const herrajesEditables = herrajesSnap || (c.herrajesDetalle || []).map(h => ({
        id: h.id || '', nombre: h.nombre, cantidad: Math.round(h.cantidad / (Number(a.cantidad)||1)),
        precio: h.precioUnit || 0, unidad: h.unidad || 'u',
      }));
      // Dropdown opciones de herrajes para esta linea
      const herrajesOptsAb = state.herrajes
        .filter(hh => hh.linea_id === a.linea_id)
        .map(hh => hh.id + '|' + hh.nombre + '|' + hh.precio + '|' + (hh.unidad||'u'))
        .join(',');

      const herrajesHtml = herrajesEditables.map(function(h, hi) {
        return _renderHerrajeRow(a.id, a.linea_id, a.cantidad, h, hi);
      }).join('');

      return `
      <div class="ab-card" style="flex-direction:column;gap:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="flex:1">
            <div class="ab-nombre">${a.nombre}</div>
            <div class="ab-meta">${a.ancho}x${a.alto} mm · ${a.cantidad} u. · ${a.linea}</div>
          </div>
          <div style="text-align:right">
            <div class="ab-costo">${fmt(cTotal)}</div>
            <button class="btn-danger" style="margin-top:6px" onclick="eliminarAbertura('${a.id}')">✕ Eliminar</button>
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;gap:24px;flex-wrap:wrap;">
          <div style="flex:1;min-width:160px;">
            <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Desglose</div>
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0;">
              <span>Perfiles aluminio</span>
              <span style="font-family:'DM Mono',monospace;">${fmt(c.perfiles)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0;">
              <span>Vidrios</span>
              <span style="font-family:'DM Mono',monospace;">${fmt(c.vidrios)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0;">
              <span>Herrajes</span>
              <span style="font-family:'DM Mono',monospace;">${fmt(c.herrajes)}</span>
            </div>
          </div>
          <div style="flex:2;min-width:200px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;">Herrajes y accesorios</span>
              <button onclick="showModalAgregarHerraje('${a.id}')" style="font-size:11px;padding:3px 10px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">+ Agregar herraje</button>
            </div>
            ${herrajesHtml || '<div style="font-size:12px;color:var(--text3);">Sin herrajes</div>'}
          </div>
        </div>
      </div>`;
    }).join('');

    const criterioOpts = [
      { id: 'proporcional',   label: 'Precio proporcional al uso' },
      { id: 'barra_completa', label: 'Precio perfil completo' },
    ].map(o => `<option value="${o.id}" ${criterio===o.id?'selected':''}>${o.label}</option>`).join('');

    tabContent = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">
        <span style="font-size:13px;color:var(--text2);font-weight:600;">Criterio de precio:</span>
        <select style="flex:1;max-width:280px;" onchange="setCriterioPrecio(this.value)">${criterioOpts}</select>
      </div>
      ${abCards}
      <div id="addAbWrap"></div>
      <button class="btn-add-ab" onclick="showAddAbertura()">+ Agregar abertura</button>`;
  }

  if (tab === 'calculo') {
    const pres = state.presupuestos.find(x => x.id === state.presupuestoActivo);
    const precioKg = getPrecioKgPresupuesto(pres);
    const criterio = state._criterioPrecio || 'proporcional';

    // Recalcular bin packing consolidado para detalle de barras
    let barrasAcum = {};
    for (const a of abs) {
      const cant = Number(a.cantidad) || 1;
      const params = tryParse(a.params, {});
      const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, state.perfiles);
      const perfilesFiltrados = state.perfiles.filter(pf => pf.linea_id === a.linea_id);
      const agrupados = {};
      for (const c of cortesRaw) {
        if (!c.perfil) continue;
        const key = c.perfil.codigo || c.perfil.id;
        if (!agrupados[key]) agrupados[key] = [];
        agrupados[key].push({ largo: c.largo, cantidad: c.cantidad * cant, desc: c.desc });
      }
      const { barrasFinales } = optimizarCortesConSobrantes(agrupados, perfilesFiltrados, precioKg, barrasAcum);
      barrasAcum = barrasFinales;
    }

    // Calcular costos según criterio para mostrar en consolidado
    const costosMat = calcularCostoAberturas(abs, state.perfiles, state.herrajes, precioKg, criterio, state.umbral_sobrante);
    const costoPorPerfil = {}; // k -> costo total según criterio
    for (const a of abs) {
      const params = tryParse(a.params, {});
      const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, state.perfiles);
      for (const c of cortesRaw) {
        if (!c.perfil) continue;
        const k = c.perfil.codigo || c.perfil.id;
        if (!costoPorPerfil[k]) costoPorPerfil[k] = 0;
      }
    }
    // Distribuir costos de perfiles por perfil key
    for (const a of abs) {
      const params = tryParse(a.params, {});
      const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, state.perfiles);
      const mmEsta = {};
      for (const c of cortesRaw) {
        if (!c.perfil) continue;
        const k = c.perfil.codigo || c.perfil.id;
        mmEsta[k] = (mmEsta[k] || 0) + c.largo * c.cantidad;
      }
    }

    // Construir consolidadoFinal con costo según criterio
    const consolidadoFinal = {};
    for (const [k, barras] of Object.entries(barrasAcum)) {
      const perfil = state.perfiles.find(p => p.codigo === k || p.id === k);
      if (!perfil) continue;
      const nombre = perfil.nombre || k;
      const codigo = perfil.codigo || '';
      const largoBarra = Number(perfil.largo_barra || 6000);
      const costoPorBarra = Number(perfil.peso_tira || 0) * precioKg;
      // Costo según criterio = suma de perfilesPorCodigo de todas las aberturas para este perfil
      let costoSegunCriterio = 0;
      for (const a of abs) {
        costoSegunCriterio += costosMat[a.id]?.perfilesPorCodigo?.[k] || 0;
      }

      consolidadoFinal[k] = {
        nombre, codigo, largoBarra, costoPorBarra,
        barras: barras.length,
        costo: costoSegunCriterio,
        detalleBarras: barras.map((b, i) => ({
          barra: i + 1,
          piezas: b.piezas || [],
          resto: b.resto,
          largoBarra,
          nueva: b.nueva,
        })),
      };
    }

    const criterioOpts = [
      { id: 'proporcional',   label: 'Precio proporcional al uso' },
      { id: 'barra_completa', label: 'Precio perfil completo' },
    ].map(o => `<option value="${o.id}" ${criterio===o.id?'selected':''}>${o.label}</option>`).join('');

    const tieneConsolidado = Object.keys(consolidadoFinal).length > 0;

    const matRows = tieneConsolidado
      ? Object.entries(consolidadoFinal).map(([k, m]) => {
          const rowId = 'mr_' + k.replace(/[^a-zA-Z0-9]/g, '_');
          const barrasHtml = m.detalleBarras.map(b => {
            const piezasHtml = (b.piezas || []).map(pz =>
              '<div style="display:inline-flex;align-items:center;gap:4px;background:var(--accent)22;border:1px solid var(--accent)44;border-radius:4px;padding:3px 8px;font-size:11px;margin:2px;">'
              + '<span style="font-family:\'DM Mono\',monospace;color:var(--accent);font-weight:700;">' + pz.largo + 'mm</span>'
              + (pz.desc ? '<span style="color:var(--text3);font-size:10px;">— ' + pz.desc + '</span>' : '')
              + '</div>'
            ).join('');
            const usadoMm = m.largoBarra - (b.resto || 0);
            const pct = Math.round((usadoMm / m.largoBarra) * 100);
            const colorBarra = pct > 90 ? 'var(--accent)' : pct > 70 ? '#FFB830' : '#FF4D6A';
            const esSobrante = (b.resto || 0) / m.largoBarra * 100 > state.umbral_sobrante;
            return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:6px;">'
              + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
                + '<span style="font-size:11px;font-weight:700;color:var(--text3)">BARRA ' + b.barra + '</span>'
                + '<span style="font-size:11px;font-family:\'DM Mono\',monospace;color:'+colorBarra+'">'
                  + usadoMm + '/' + m.largoBarra + 'mm · resto: ' + (b.resto||0) + 'mm · ' + pct + '%'
                  + (esSobrante ? ' <span style="color:#00E5A0;font-size:10px;">→ stock</span>' : '')
                + '</span>'
              + '</div>'
              + '<div style="height:8px;background:var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;">'
                + '<div style="height:100%;width:'+pct+'%;background:'+colorBarra+';border-radius:4px;"></div>'
              + '</div>'
              + piezasHtml
            + '</div>';
          }).join('');

          return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;">'
            + '<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleMatRow(\''+rowId+'\')">'
              + '<div style="display:flex;align-items:center;gap:10px;">'
                + (m.codigo ? '<span style="font-family:\'DM Mono\',monospace;color:var(--accent);font-size:12px;background:var(--accent)11;padding:2px 8px;border-radius:4px;">['+m.codigo+']</span>' : '')
                + '<span style="font-weight:600;color:var(--text)">' + m.nombre + '</span>'
              + '</div>'
              + '<div style="display:flex;align-items:center;gap:16px;">'
                + '<span class="mat-badge">' + m.barras + ' barra' + (m.barras!==1?'s':'') + '</span>'
                + '<span style="font-family:\'DM Mono\',monospace;color:var(--accent);font-weight:700;">' + fmt(m.costo) + '</span>'
                + '<span style="color:var(--text3);font-size:12px;">▼</span>'
              + '</div>'
            + '</div>'
            + '<div id="'+rowId+'" style="display:none;">' + barrasHtml + '</div>'
          + '</div>';
        }).join('')
      : '<div style="color:var(--text3);padding:24px;text-align:center;border:1px dashed var(--border2);border-radius:8px">Sin datos. Agregá aberturas primero.</div>';

    const detalle = abs.map(a => {
      const cAb = costosMat[a.id] || {};
      const params = tryParse(a.params, {});
      const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, state.perfiles);
      const perfilesFiltrados = state.perfiles.filter(pf => pf.linea_id === a.linea_id);
      const perfilesUsados = [...new Set(cortesRaw.filter(c => c.perfil).map(c => c.perfil.codigo || c.perfil.id))];
      const filas = perfilesUsados.map(k => {
        const perfil = perfilesFiltrados.find(p => p.codigo === k || p.id === k);
        if (!perfil) return '';
        const cant = Number(a.cantidad) || 1;
        const mmAb = cortesRaw.filter(c => c.perfil && (c.perfil.codigo === k || c.perfil.id === k))
          .reduce((s, c) => s + c.largo * c.cantidad * cant, 0);
        // Usar costo desglosado por perfil directamente
        const costoEste = cAb.perfilesPorCodigo?.[k] || 0;
        return '<div class="preview-row">'
          + '<span>['+k+'] ' + perfil.nombre + '</span>'
          + '<span style="color:var(--text3)">' + mmAb + 'mm usados</span>'
          + '<span>' + fmt(costoEste) + '</span>'
          + '</div>';
      }).join('');
      const cantAb = Number(a.cantidad) || 1;
      const vidrioFilas = (tryParse(a.vidrios, []) || []).map(v =>
        '<div class="preview-row">'
        + '<span>' + v.desc + ' (' + v.ancho + 'x' + v.alto + 'mm)' + (cantAb > 1 ? ' × '+cantAb : '') + '</span>'
        + '<span style="color:var(--text3)">' + ((v.ancho/1000)*(v.alto/1000)*cantAb).toFixed(2) + ' m²</span>'
        + '<span>' + fmt((v.ancho/1000)*(v.alto/1000)*Number(a.precio_vidrio||8500)*cantAb) + '</span>'
        + '</div>'
      ).join('');
      return '<div style="margin-bottom:18px">'
        + '<div style="font-size:13px;font-weight:700;color:var(--text3);background:var(--bg);padding:8px 12px;border-radius:7px;margin-bottom:6px">'
          + a.nombre + ' — ' + a.ancho + 'x' + a.alto + 'mm x ' + a.cantidad + ' u.'
        + '</div>'
        + filas + vidrioFilas
        + '</div>';
    }).join('');

    tabContent = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">
        <span style="font-size:13px;color:var(--text2);font-weight:600;">Criterio de precio:</span>
        <select style="flex:1;max-width:280px;" onchange="setCriterioPrecio(this.value)">${criterioOpts}</select>
      </div>
      <h3 style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.05em">Materiales consolidados — click para ver cortes por barra</h3>
      ${matRows}
      <h3 style="font-size:14px;font-weight:700;color:var(--text2);margin:24px 0 14px;text-transform:uppercase;letter-spacing:0.05em">Detalle por abertura</h3>
      ${detalle || '<p style="color:var(--text3)">Sin aberturas</p>'}`;
  }

  if (tab === 'resumen') {
    const presR = state.presupuestos.find(x => x.id === state.presupuestoActivo);
    const precioKgR = getPrecioKgPresupuesto(presR);
    const criterioR = state._criterioPrecio || 'proporcional';
    const costosR = calcularCostoAberturas(abs, state.perfiles, state.herrajes, precioKgR, criterioR, state.umbral_sobrante);
    const costoPR = Object.values(costosR).reduce((s, c) => s + c.perfiles * 1, 0);
    const costoVR = Object.values(costosR).reduce((s, c) => s + c.vidrios * 1, 0);
    const costoHR = Object.values(costosR).reduce((s, c) => s + c.herrajes * 1, 0);
    const subtotalR = costoPR + costoVR + costoHR;
    const totalFinalR = subtotalR * (1 + markup / 100);

    const criterioOpts2 = [
      { id: 'proporcional',   label: 'Precio proporcional al uso' },
      { id: 'barra_completa', label: 'Precio perfil completo' },
    ].map(o => `<option value="${o.id}" ${criterioR===o.id?'selected':''}>${o.label}</option>`).join('');

    tabContent = `
      <div style="max-width:520px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">
          <span style="font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap;">Criterio:</span>
          <select style="flex:1;" onchange="setCriterioPrecio(this.value)">${criterioOpts2}</select>
        </div>
        <div class="card">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:18px">Resumen de costos</div>
          <div class="resumen-row"><span>Perfiles de aluminio</span><span style="font-family:'DM Mono',monospace">${fmt(costoPR)}</span></div>
          <div class="resumen-row"><span>Vidrios</span><span style="font-family:'DM Mono',monospace">${fmt(costoVR)}</span></div>
          <div class="resumen-row"><span>Herrajes</span><span style="font-family:'DM Mono',monospace">${fmt(costoHR)}</span></div>

// ============================================================
// KANBAN
// ============================================================
function renderKanban() {
  const aprobados = state.presupuestos.filter(p => p.estado === 'aprobado' || p.kanban_col);
  const colIdx = Object.fromEntries(KANBAN_COLS.map((c, i) => [c.id, i]));

  const cols = KANBAN_COLS.map(col => {
    const cards = aprobados.filter(p => (p.kanban_col || 'pendiente') === col.id);
    const cardHtml = cards.map(p => {
      const colActualIdx = colIdx[col.id] ?? 0;
      // Solo mostrar "avanzar" (siguiente columna) y opcionalmente retroceder
      const colSiguiente = KANBAN_COLS[colActualIdx + 1];
      const colAnterior  = KANBAN_COLS[colActualIdx - 1];

      // Ícono especial para transiciones con lógica
      const labelSig = col.id === 'pendiente'    ? '🛒 Pasar a Compra'
                     : col.id === 'materiales'   ? '🔨 Pasar a Construcción'
                     : colSiguiente               ? '→ ' + colSiguiente.label
                     : null;

      const btnAvanzar = colSiguiente
        ? `<button onclick="moverKanban('${p.id}','${colSiguiente.id}')" style="background:${colSiguiente.color}22;color:${colSiguiente.color};border-color:${colSiguiente.color}44;font-weight:600;">${labelSig}</button>`
        : '';
      const btnRetroceder = colAnterior
        ? `<button onclick="moverKanban('${p.id}','${colAnterior.id}')" style="font-size:10px;opacity:0.6;">← ${colAnterior.label}</button>`
        : '';

      // Indicador de stock para columna materiales
      let stockIndicador = '';
      if (col.id === 'materiales') {
        const analisis = calcularNecesidadesMateriales(p);
        const conStock = analisis.filter(a => a.stockUsado.length > 0).length;
        const barrasComprar = analisis.reduce((s, a) => s + a.barrasNuevas.length, 0);
        stockIndicador = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 4px;">
          ${conStock > 0 ? `<span style="font-size:10px;padding:2px 8px;background:var(--accent)22;color:var(--accent);border-radius:10px;font-weight:700;">${conStock} del stock</span>` : ''}
          ${barrasComprar > 0 ? `<span style="font-size:10px;padding:2px 8px;background:#FFB83022;color:#FFB830;border-radius:10px;font-weight:700;">${barrasComprar} a comprar</span>` : ''}
          ${barrasComprar === 0 ? `<span style="font-size:10px;padding:2px 8px;background:var(--accent)22;color:var(--accent);border-radius:10px;font-weight:700;">✓ sin compras</span>` : ''}
        </div>`;
      }

      return `
      <div class="kanban-card">
        <div class="kanban-card-cliente">${p.cliente}</div>
        <div class="kanban-card-obra">${p.obra}</div>
        <div class="kanban-card-total">${fmt(p.total_final)}</div>
        ${stockIndicador}
        <div class="kanban-move">
          ${btnAvanzar}
          ${btnRetroceder}
        </div>
      </div>`;
    }).join('') || `<div style="padding:20px 0;text-align:center;color:var(--text3);font-size:12px;">Sin obras</div>`;

    return `
    <div class="kanban-col">
      <div class="kanban-col-title" style="color:${col.color}">
        ${col.label} <span class="kanban-count">${cards.length}</span>
      </div>
      ${cardHtml}
    </div>`;
  }).join('');

  return `
  <div class="page-header">
    <div>
      <div class="page-title">Kanban de Obras</div>
      <div class="page-sub">Presupuestos aprobados en seguimiento</div>
    </div>
  </div>
  <div class="kanban-board">${cols}</div>`;
}

function toggleMatRow(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function setConfigLinea(linea_id) {
  state._configLinea = linea_id;
  const tipos = getTiposLinea(linea_id);
  state._configTipo = tipos[0]?.id || '';
  render();
}

function setConfigTipo(tipo_id) {
  state._configTipo = tipo_id;
  render();
}

function _ensureConfigTipo(linea_id, tipo_id) {
  if (!state.config_tipologias[linea_id]) state.config_tipologias[linea_id] = {};
  if (!state.config_tipologias[linea_id][tipo_id]) {
    const def = CONFIG_TIPOLOGIAS_DEFAULT[linea_id]?.[tipo_id];
    state.config_tipologias[linea_id][tipo_id] = def
      ? { perfiles: def.perfiles.map(p => ({...p})), vidrio: {...def.vidrio} }
      : { perfiles: [], vidrio: { formula_ancho: '', formula_alto: '' } };
  }
  return state.config_tipologias[linea_id][tipo_id];
}

// Guarda config de una tipología en la pestaña Config del Sheet
async function saveConfigTipo(linea_id, tipo_id) {
  const cfg = state.config_tipologias?.[linea_id]?.[tipo_id];
  if (!cfg) return;
  const key = 'tipologia_' + linea_id + '__' + tipo_id;
  const value = JSON.stringify(cfg);
  // Buscar si ya existe una fila con esta key
  const existing = await sheetsGet(SHEETS.config);
  const row = existing.find(r => r.key === key);
  if (row) {
    await sheetsUpdateRow(SHEETS.config, row.id, { key, value });
  } else {
    await sheetsAppend(SHEETS.config, { id: genId(), key, value });
  }
}

function updateConfigPerfil(linea_id, tipo_id, idx, campo, valor) {
  const cfg = _ensureConfigTipo(linea_id, tipo_id);
  if (cfg.perfiles[idx]) cfg.perfiles[idx][campo] = valor;
  saveConfigTipo(linea_id, tipo_id);
  toast('Guardado');
}

function updateConfigVidrio(linea_id, tipo_id, campo, valor) {
  const cfg = _ensureConfigTipo(linea_id, tipo_id);
  cfg.vidrio[campo] = valor;
  saveConfigTipo(linea_id, tipo_id);
  toast('Guardado');
}

async function crearTipologiaCustom(linea_id) {
  const btn = document.getElementById('btnCrearTipo');
  const nombre = document.getElementById('nt_nombre')?.value?.trim();
  if (!nombre) { toast('Ingresá un nombre', 'error'); return; }
  const con_hojas = document.getElementById('nt_con_hojas')?.value === '1';
  const hojas_min     = Number(document.getElementById('nt_hojas_min')?.value) || 1;
  const hojas_max     = Number(document.getElementById('nt_hojas_max')?.value) || 4;
  const hojas_default = Number(document.getElementById('nt_hojas_default')?.value) || 1;

  // Generar id único basado en nombre
  const id = linea_id + '_custom_' + nombre.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').slice(0, 30);

  // Verificar que no exista ya
  if (state.tipologias_custom.find(t => t.id === id)) {
    toast('Ya existe una tipología con ese nombre', 'error'); return;
  }

  setBtnLoading(btn, true, 'Creando...');
  try {
    const meta = { id, linea_id, nombre, con_hojas, hojas_min, hojas_max, hojas_default };
    state.tipologias_custom.push(meta);

    // Guardar metadatos en Config sheet
    const key = 'tipologia_custom_meta__' + id;
    await sheetsAppend(SHEETS.config, { id: genId(), key, value: JSON.stringify(meta) });

    // Crear config vacía para que aparezca en la sección de fórmulas
    if (!state.config_tipologias[linea_id]) state.config_tipologias[linea_id] = {};
    state.config_tipologias[linea_id][id] = { perfiles: [], vidrio: { formula_ancho: '', formula_alto: '' }, herrajes: [] };
    await saveConfigTipo(linea_id, id);

    // Navegar a la nueva tipología en config
    state._configLinea = linea_id;
    state._configTipo  = id;

    closeModal();
    toast('Tipología "' + nombre + '" creada');
    render();
  } catch(e) {
    toast('Error al crear tipología', 'error');
    setBtnLoading(btn, false);
  }
}

async function eliminarTipologiaCustom(id) {
  const t = state.tipologias_custom.find(x => x.id === id);
  if (!t) return;
  if (!confirm('¿Eliminar la tipología "' + t.nombre + '"? Se eliminarán también sus fórmulas configuradas.')) return;

  // Eliminar meta del Config sheet
  const configRows = await sheetsGet(SHEETS.config);
  const metaRow = configRows.find(r => r.key === 'tipologia_custom_meta__' + id);
  if (metaRow) await sheetsDeleteRow(SHEETS.config, metaRow.id);

  // Eliminar config de fórmulas del sheet
  const cfgKey = 'tipologia_' + t.linea_id + '__' + id;
  const cfgRow = configRows.find(r => r.key === cfgKey);
  if (cfgRow) await sheetsDeleteRow(SHEETS.config, cfgRow.id);

  // Limpiar state
  state.tipologias_custom = state.tipologias_custom.filter(x => x.id !== id);
  if (state.config_tipologias[t.linea_id]) {
    delete state.config_tipologias[t.linea_id][id];
  }

  // Volver al primer tipo de la línea
  const tipos = getTiposLinea(t.linea_id);
  state._configTipo = tipos[0]?.id || '';

  toast('Tipología eliminada');
  render();
}

  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
