// ============================================================
// ANÁLISIS DE MATERIALES (transición → compra materiales)
// ============================================================
function calcularNecesidadesMateriales(p) {
  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
  const precioKg = getPrecioKgPresupuesto(p);

  // Agrupar mm necesarios por perfil en todo el presupuesto
  const necesidades = {}; // { perfilCodigo: { perfil, piezas: [{largo, desc}], mmTotal } }
  for (const a of abs) {
    const cant = Number(a.cantidad) || 1;
    const params = tryParse(a.params, {});
    const cortesRaw = getCortesRaw(a.linea_id, a.tipo_id, Number(a.ancho), Number(a.alto), params, state.perfiles);
    for (const c of cortesRaw) {
      if (!c.perfil) continue;
      const k = c.perfil.codigo || c.perfil.id;
      if (!necesidades[k]) necesidades[k] = { perfil: c.perfil, piezas: [], mmTotal: 0 };
      // Repetir cada pieza por la cantidad de aberturas
      for (let i = 0; i < c.cantidad * cant; i++) {
        necesidades[k].piezas.push({ largo: c.largo, desc: c.desc, abertura: a.nombre + (cant > 1 ? " ("+cant+"u.)" : "") });
      }
      necesidades[k].mmTotal += c.largo * c.cantidad * cant;
    }
  }

  // Para cada perfil, cruzar con stock disponible
  const resultado = [];
  for (const [k, nec] of Object.entries(necesidades)) {
    const stockDisponible = state.stock.filter(s =>
      (s.perfil_id === nec.perfil.id || s.perfil_nombre?.includes('['+k+']') || s.perfil_nombre?.includes(nec.perfil.nombre))
      && Number(s.largo_mm) > 50
    );

    // Simular bin packing usando sobrantes primero
    const piezasOrdenadas = [...nec.piezas].sort((a, b) => b.largo - a.largo);
    const barrasStock = stockDisponible.map(s => ({ stockId: s.id, largo_mm: Number(s.largo_mm), perfil_nombre: s.perfil_nombre, resto: Number(s.largo_mm), usado: false }));
    const barrasNuevas = [];
    const stockUsado = []; // { stockId, largo_mm, piezas }

    const largoBarra = Number(nec.perfil.largo_barra) || 6000;

    for (const pieza of piezasOrdenadas) {
      let ok = false;
      // Intentar en stock primero
      for (const bs of barrasStock) {
        if (!bs.usado && bs.resto >= pieza.largo) {
          bs.resto -= pieza.largo;
          const existing = stockUsado.find(u => u.stockId === bs.stockId);
          if (existing) existing.piezas.push(pieza);
          else stockUsado.push({ stockId: bs.stockId, largo_mm: bs.largo_mm, perfil_nombre: bs.perfil_nombre, piezas: [pieza], restoFinal: bs.resto });
          ok = true;
          break;
        }
      }
      if (!ok) {
        // Barra nueva
        let barraActual = barrasNuevas[barrasNuevas.length - 1];
        if (!barraActual || barraActual.resto < pieza.largo) {
          barraActual = { largoBarra, resto: largoBarra, piezas: [], sobrante: 0 };
          barrasNuevas.push(barraActual);
        }
        barraActual.resto -= pieza.largo;
        barraActual.sobrante = barraActual.resto;
        barraActual.piezas.push(pieza);
      }
    }

    // Actualizar restoFinal en stockUsado
    for (const su of stockUsado) {
      const bs = barrasStock.find(b => b.stockId === su.stockId);
      if (bs) su.restoFinal = bs.resto;
    }

    const costoKg = Number(nec.perfil.peso_tira || 0) * getPrecioKgPresupuesto(p);
    const sobrantesNuevos = barrasNuevas
      .filter(b => b.sobrante > 50)
      .map(b => ({ perfil: nec.perfil, largo_mm: Math.round(b.sobrante) }));

    resultado.push({
      perfil: nec.perfil,
      codigo: k,
      mmTotal: nec.mmTotal,
      piezasTotal: nec.piezas.length,
      stockUsado,           // sobrantes del stock que se usan
      barrasNuevas,         // barras a comprar
      sobrantesNuevos,      // sobrantes que van a quedar de las barras nuevas
      costoEstimado: barrasNuevas.length * costoKg,
    });
  }
  return resultado;
}

function showModalAnalisisMateriales(p) {
  const analisis = calcularNecesidadesMateriales(p);
  const totalBarrasComprar = analisis.reduce((s, a) => s + a.barrasNuevas.length, 0);
  const totalAhorro = analisis.filter(a => a.stockUsado.length > 0).length;

  const filas = analisis.map((a, idx) => {
    const stockHtml = a.stockUsado.length > 0
      ? a.stockUsado.map(su => {
          const usadoMm = su.largo_mm - su.restoFinal;
          const otrosPresup = state.presupuestos.filter(pp =>
            pp.id !== p.id && ['pendiente','materiales','construccion'].includes(pp.kanban_col)
          );
          const posibleConflicto = otrosPresup.some(() => false); // placeholder sin reservas formales
          return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
            <span style="color:var(--accent);font-size:11px;">✓ STOCK</span>
            <span style="font-size:12px;color:var(--text2)">${su.perfil_nombre}</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${su.largo_mm}mm → usa ${usadoMm}mm, queda ${su.restoFinal}mm</span>
          </div>`;
        }).join('')
      : '';

    const comprasHtml = a.barrasNuevas.length > 0
      ? `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
          <span style="color:#FFB830;font-size:11px;">🛒 COMPRAR</span>
          <span style="font-size:12px;color:var(--text2)">${a.barrasNuevas.length} barra${a.barrasNuevas.length!==1?'s':''} de ${(Number(a.perfil.largo_barra)||6000)/1000}m</span>
          ${a.costoEstimado > 0 ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">≈ ${fmt(a.costoEstimado)}</span>` : ''}
          ${a.sobrantesNuevos.length > 0 ? `<span style="font-size:11px;color:var(--text3);">→ genera ${a.sobrantesNuevos.length} sobrante${a.sobrantesNuevos.length!==1?'s':''}</span>` : ''}
        </div>`
      : '';

    const hayInfo = stockHtml || comprasHtml;
    return `<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${hayInfo?'8':'0'}px;">
        <span style="font-family:'DM Mono',monospace;color:var(--accent);font-size:12px;background:var(--accent)11;padding:2px 7px;border-radius:4px;">[${a.codigo}]</span>
        <span style="font-weight:600;font-size:13px;">${a.perfil.nombre}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto;">${a.mmTotal}mm · ${a.piezasTotal} pieza${a.piezasTotal!==1?'s':''}</span>
      </div>
      ${stockHtml}${comprasHtml}
    </div>`;
  }).join('');

  const resumen = `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;">
    ${totalAhorro > 0 ? `<div style="background:var(--accent)11;border:1px solid var(--accent)33;border-radius:8px;padding:10px 16px;">
      <div style="font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;">Del stock</div>

async function confirmarPasarAMateriales(presupuestoId) {

// ============================================================
// CONFIRMAR CONSTRUCCIÓN (transición → construccion)
// ============================================================
function showModalConfirmarConstruccion(p) {
  const analisis = calcularNecesidadesMateriales(p);

  // Sobrantes de stock a consumir
  const stockAConsumir = [];
  for (const a of analisis) {
    for (const su of a.stockUsado) {
      stockAConsumir.push({ ...su, perfil: a.perfil, codigo: a.codigo });
    }
  }

  // Sobrantes nuevos a generar
  const sobrantesNuevos = [];
  for (const a of analisis) {
    for (const sn of a.sobrantesNuevos) {
      sobrantesNuevos.push({ ...sn, codigo: a.codigo });
    }
  }

  const consumirHtml = stockAConsumir.length > 0
    ? stockAConsumir.map((su, i) => {
        const usadoMm = su.largo_mm - su.restoFinal;
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;">
          <input type="checkbox" id="consumir_${i}" checked style="accent-color:var(--accent);width:16px;height:16px;">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">${su.perfil_nombre || su.perfil.nombre}</div>
            <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">usa ${usadoMm}mm de ${su.largo_mm}mm disponibles ${su.restoFinal > 50 ? '→ queda '+su.restoFinal+'mm en stock' : '→ se consume completo'}</div>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--text3);font-size:13px;padding:8px 0;">Sin sobrantes de stock a consumir.</div>';

  const sobrantesHtml = sobrantesNuevos.length > 0
    ? sobrantesNuevos.map((sn, i) => {
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;">
          <input type="checkbox" id="sobrante_nuevo_${i}" checked style="accent-color:var(--accent);width:16px;height:16px;">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">[${sn.codigo}] ${sn.perfil.nombre}</div>
            <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">${sn.largo_mm}mm de sobrante</div>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--text3);font-size:13px;padding:8px 0;">Las barras compradas no generan sobrantes significativos.</div>';

  // Guardar análisis en window para usar al confirmar
  window._kanbanAnalisis = { presupuestoId: p.id, stockAConsumir, sobrantesNuevos, presupuesto: p };

  showModal(`
    <div class="modal-title">Confirmar paso a Construcción</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:18px;">${p.cliente} — ${p.obra}</div>

    <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em;">
      📦 Sobrantes de stock a consumir
    </div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:18px;">${consumirHtml}</div>

    <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em;">
      ✨ Sobrantes nuevos a agregar al stock
    </div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:18px;">${sobrantesHtml}</div>

    <div style="font-size:11px;color:var(--text3);padding:8px 12px;background:var(--bg);border-radius:6px;margin-bottom:18px;">
      ⚠️ Esta acción modifica el stock. Los sobrantes marcados se eliminarán/agregarán al confirmar.
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="btnConfirmarConstruccion" onclick="confirmarPasarAConstruccion()">Confirmar y actualizar stock</button>
    </div>`);
}

async function confirmarPasarAConstruccion() {
  const btn = document.getElementById('btnConfirmarConstruccion');
  setBtnLoading(btn, true, 'Actualizando...');
  try {
    const { presupuestoId, stockAConsumir, sobrantesNuevos, presupuesto: p } = window._kanbanAnalisis;

    // 1. Eliminar del stock los sobrantes marcados para consumir
    for (let i = 0; i < stockAConsumir.length; i++) {
      const checked = document.getElementById('consumir_' + i)?.checked;
      if (!checked) continue;
      const su = stockAConsumir[i];
      // Eliminar el sobrante original del stock
      state.stock = state.stock.filter(s => s.id !== su.stockId);
      await sheetsDeleteRow(SHEETS.stock, su.stockId);
      // Si quedó un resto significativo, lo volvemos a agregar como sobrante nuevo
      if (su.restoFinal > 50) {
        const linea = state.lineas.find(l => l.id === su.perfil?.linea_id) || {};
        const nuevoSobrante = {
          id: genId(),
          perfil_id: su.perfil?.id || '',
          perfil_nombre: su.perfil_nombre || su.perfil?.nombre || '',
          linea: linea.nombre || '',
          largo_mm: su.restoFinal,
          nota: 'Resto de sobrante usado en ' + p.cliente + ' — ' + p.obra,
          fecha: today(),
        };
        state.stock.push(nuevoSobrante);
        await sheetsAppend(SHEETS.stock, nuevoSobrante);
      }
    }

    // 2. Agregar al stock los sobrantes nuevos marcados
    for (let i = 0; i < sobrantesNuevos.length; i++) {
      const checked = document.getElementById('sobrante_nuevo_' + i)?.checked;
      if (!checked) continue;
      const sn = sobrantesNuevos[i];
      const linea = state.lineas.find(l => l.id === sn.perfil?.linea_id) || {};
      const s = {
        id: genId(),
        perfil_id: sn.perfil?.id || '',
        perfil_nombre: sn.perfil?.nombre + (sn.codigo ? ' [' + sn.codigo + ']' : ''),
        linea: linea.nombre || '',
        largo_mm: sn.largo_mm,
        nota: 'Sobrante de obra: ' + p.cliente + ' — ' + p.obra,
        fecha: today(),
      };
      state.stock.push(s);
      await sheetsAppend(SHEETS.stock, s);
    }

    closeModal();
    const pp = state.presupuestos.find(x => x.id === presupuestoId);
    await _ejecutarMoverKanban(pp, 'construccion');
    toast('Stock actualizado y obra en construcción ✓');
  } catch(e) {
    console.error(e);
    toast('Error al actualizar stock', 'error');
    setBtnLoading(btn, false);
  }
}

// Helper: renderiza una fila de herraje (solo lectura + boton eliminar)
function _renderHerrajeRow(abId, lineaId, abCantidad, h, hi) {
  const subtotal = fmt(h.precio * h.cantidad * (Number(abCantidad) || 1));
  return '<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);">'
    + '<span style="flex:1;font-size:13px;color:var(--text2);">' + h.nombre + '</span>'
    + '<span style="font-size:12px;color:var(--text3);">' + h.cantidad + ' ' + (h.unidad||'u') + '</span>'
    + '<span style="font-size:13px;color:var(--accent);min-width:72px;text-align:right;">' + subtotal + '</span>'
    + '<button onclick="eliminarHerrajeAbertura(\'' + abId + '\',' + hi + ')"'
    + ' style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:13px;padding:0 3px;"'
    + ' title="Eliminar">x</button>'
    + '</div>';
}

// ============================================================
// EDICION HERRAJES EN ABERTURA
// ============================================================
function _getHerrajesSnapAb(a) {
  // Devuelve el snap actual de herrajes (por unidad)
  return tryParse(a.herrajes_snap, null) ||
    getHerrajesTipo(a.linea_id, a.tipo_id, tryParse(a.params, {})).map(h => {
      const hObj = state.herrajes.find(x => x.id === h.id);
      return { id: h.id, nombre: hObj?.nombre || h.descripcion || h.id, cantidad: h.cantidad, precio: Number(hObj?.precio || 0), unidad: hObj?.unidad || 'u' };
    });
}

// Muestra overlay de guardado sobre la card de una abertura
function _showSavingOverlay(abId) {
  const cards = document.querySelectorAll('.ab-card');
  // Buscar la card que contiene botones con el abId
  for (const card of cards) {
    if (card.innerHTML.includes(abId)) {
      const ov = document.createElement('div');
      ov.id = 'saving_' + abId;
      ov.style.cssText = 'position:absolute;inset:0;background:rgba(10,15,30,0.6);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text2);font-size:13px;z-index:10;';
      ov.innerHTML = '<div class="spinner"></div> Guardando...';
      card.style.position = 'relative';
      card.appendChild(ov);
      return;
    }
  }
}
function _hideSavingOverlay(abId) {
  document.getElementById('saving_' + abId)?.remove();
}

async function _guardarHerrajesSnap(a) {
  a.costo_herrajes = (a.herrajes_snap || []).reduce((s, h) => s + h.precio * h.cantidad, 0);
  await sheetsUpdateRow(SHEETS.aberturas, a.id, {
    herrajes_snap: JSON.stringify(a.herrajes_snap),
    costo_herrajes: a.costo_herrajes,
  });
  await recalcularTotal();
}



async function eliminarHerrajeAbertura(abId, hi) {
  const a = state.aberturas.find(x => x.id === abId);
  if (!a) return;
  _showSavingOverlay(abId);
  try {
    const snap = _getHerrajesSnapAb(a).map(h => ({...h}));
    snap.splice(hi, 1);
    a.herrajes_snap = snap;
    await _guardarHerrajesSnap(a);
  } finally {
    _hideSavingOverlay(abId);
    render();
  }
}

async function confirmarAgregarHerraje(abId) {
  const a = state.aberturas.find(x => x.id === abId);
  if (!a) return;
  const herrajeId = document.getElementById('mh_id')?.value;

}


async function eliminarAbertura(id) {
  if (!confirm('¿Eliminar esta abertura? Los costos del presupuesto se recalcularán.')) return;

  // Mostrar loading en toda la página
  const root = document.getElementById('appRoot');
  const originalContent = root.innerHTML;
  root.innerHTML += '<div style="position:fixed;inset:0;background:rgba(10,15,30,0.7);z-index:500;display:flex;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:14px;"><div class="spinner"></div> Recalculando...</div>';

  try {
    state.aberturas = state.aberturas.filter(a => a.id !== id);
    await sheetsDeleteRow(SHEETS.aberturas, id);

    const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
    if (p) {
      const precioKg = getPrecioKgPresupuesto(p);
      const absRestantes = state.aberturas.filter(a => a.presupuesto_id === state.presupuestoActivo);
      let barrasAcumuladas = {};
      for (const a of absRestantes) {
        const params = tryParse(a.params, {});
        const res = calcularAbertura(
          a.linea_id, a.tipo_id,
          Number(a.ancho), Number(a.alto),
          params, state.perfiles, state.herrajes,
          Number(a.precio_vidrio || 8500), precioKg,
          barrasAcumuladas
        );
        if (!res) continue;
        a.costo_perfiles = res.costoPerfiles;
        a.costo_vidrios  = res.costoVidrios;
        a.costo_herrajes = res.costoHerrajes;
        a.optimizacion   = JSON.stringify(res.optimizacion);
        a.vidrios        = JSON.stringify(res.vidrios);
        await sheetsUpdateRow(SHEETS.aberturas, a.id, {
          costo_perfiles: res.costoPerfiles,
          costo_vidrios:  res.costoVidrios,
          costo_herrajes: res.costoHerrajes,
          optimizacion:   JSON.stringify(res.optimizacion),
          vidrios:        JSON.stringify(res.vidrios),
        });
        barrasAcumuladas = res.barrasFinales;
      }
    }
    await recalcularTotal();
    toast('Abertura eliminada — costos recalculados');
  } catch(e) {
    toast('Error al eliminar', 'error');
  } finally {
    render();
  }
}

async function recalcularTotal() {
  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  if (!p) return;
  const abs = state.aberturas.filter(a => a.presupuesto_id === p.id);
  const precioKg = getPrecioKgPresupuesto(p);
  // Usar calcularCostoAberturas para tener en cuenta cantidad correctamente
  const costos = calcularCostoAberturas(abs, state.perfiles, state.herrajes, precioKg, 'proporcional', state.umbral_sobrante);
  const sub = Object.values(costos).reduce((s, c) => s + c.perfiles + c.vidrios + c.herrajes, 0);
  const total = sub * (1 + Number(p.markup||0) / 100);
  p.total_final = total;
  await sheetsUpdateRow(SHEETS.presupuestos, p.id, { total_final: total });
}

async function eliminarPresupuesto(id) {
  const p = state.presupuestos.find(x => x.id === id);
  if (!p) return;
  if (p.estado !== 'generado') { toast('Solo se pueden eliminar presupuestos en estado Generado', 'error'); return; }
  if (!confirm(`¿Eliminar el presupuesto de ${p.cliente} — ${p.obra}? Esta acción no se puede deshacer.`)) return;
  // Eliminar aberturas asociadas
  const absDelPpto = state.aberturas.filter(a => a.presupuesto_id === id);
  for (const a of absDelPpto) {
    await sheetsDeleteRow(SHEETS.aberturas, a.id);
  }
  state.aberturas = state.aberturas.filter(a => a.presupuesto_id !== id);
  // Eliminar presupuesto
  state.presupuestos = state.presupuestos.filter(x => x.id !== id);
  await sheetsDeleteRow(SHEETS.presupuestos, id);
  toast('Presupuesto eliminado');
  render();
}

function showModal(html) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modalOverlay';
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() { document.getElementById('modalOverlay')?.remove(); }

function showModalNuevoPresupuesto() {
  const lineaOpts = state.lineas.map(l => `<option value="${l.id}">${l.nombre}</option>`).join('');
  showModal(`
    <div class="modal-title">Nuevo Presupuesto</div>
    <div class="form-group"><label>Cliente</label><input id="m_cliente" placeholder="Nombre del cliente"></div>
    <div class="form-group"><label>Obra / Descripcion</label><input id="m_obra" placeholder="Ej: Casa Martínez - Dormitorio"></div>
    <div class="form-group">
      <label>Linea de aluminio</label>
      <select id="m_linea_ppto" onchange="updateTiposYPrecios()">${lineaOpts}</select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo de aluminio</label>
        <select id="m_tipo_al" onchange="updatePrecioKg()">
          <option value="nuevo">Nuevo</option>
          <option value="recuperado">Recuperado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Color</label>
        <select id="m_color_al" onchange="updatePrecioKg()"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Precio por kg ($/kg)</label>
      <input type="number" id="m_precio_kg" placeholder="Se completa automáticamente" style="font-family:'DM Mono',monospace">
    </div>
    <div class="form-group"><label>Fecha</label><input id="m_fecha" value="${today()}"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="crearPresupuesto()">Crear →</button>
    </div>`);
  updateTiposYPrecios();
}

function updateTiposYPrecios() {
  const linea_id = document.getElementById('m_linea_ppto')?.value;
  const tipo = document.getElementById('m_tipo_al')?.value || 'nuevo';
  const preciosFiltrados = state.precios_kg.filter(p => p.linea_id === linea_id && p.tipo === tipo);
  const colores = [...new Set(preciosFiltrados.map(p => p.nombre))];
  const colorSel = document.getElementById('m_color_al');
  if (colorSel) {
    colorSel.innerHTML = colores.map(c => `<option value="${c}">${c}</option>`).join('');
  }
  updatePrecioKg();
}

function updatePrecioKg() {
  const linea_id = document.getElementById('m_linea_ppto')?.value;
  const tipo  = document.getElementById('m_tipo_al')?.value;
  const color = document.getElementById('m_color_al')?.value;
  const match = state.precios_kg.find(p => p.linea_id === linea_id && p.tipo === tipo && p.nombre === color);

function previewCalc() {
  const linea  = document.getElementById('m_linea')?.value;
  const tipoId = document.getElementById('m_tipo')?.value;
  const W      = parseInt(document.getElementById('m_ancho')?.value);
  const H      = parseInt(document.getElementById('m_alto')?.value);
  const cant   = parseInt(document.getElementById('m_cant')?.value) || 1;
  const pVid   = parseFloat(document.getElementById('m_pvid')?.value) || 8500;
  const preview = document.getElementById('m_preview');
  const btnAb   = document.getElementById('btnAgregarAb');
  if (!preview) return;
  if (!W || !H || !linea || !tipoId) { preview.innerHTML = ''; if (btnAb) btnAb.disabled = true; return; }

  const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
  const precioKg = getPrecioKgPresupuesto(p);
  const criterio = state._criterioPrecio || 'proporcional';

  // Simular abertura nueva junto con las existentes para calcular costo real
  const absExistentes = state.aberturas.filter(a => a.presupuesto_id === state.presupuestoActivo);
  const tipos = getTiposLinea(linea);
  const tipo  = tipos.find(t => t.id === tipoId);
  if (!tipo) return;
  const params = {};
  (tipo.params || []).forEach(pa => { params[pa.id] = parseInt(document.getElementById(`param_${pa.id}`)?.value) || pa.default; });

  // Abertura simulada (id temporal)
  const abSimulada = {
    id: '__preview__',
    presupuesto_id: state.presupuestoActivo,
    linea_id: linea,
    tipo_id: tipoId,
    ancho: W, alto: H, cantidad: cant,
    params: JSON.stringify(params),
    precio_vidrio: pVid,
    vidrios: '[]',
  };
  const todasConNueva = [...absExistentes, abSimulada];

  // Calcular con criterio seleccionado
  const costos = calcularCostoAberturas(todasConNueva, state.perfiles, state.herrajes, precioKg, criterio, state.umbral_sobrante);
  const cNueva = costos['__preview__'] || { perfiles: 0, vidrios: 0, herrajes: 0 };

  // También calcular vidrios de la nueva abertura
  const resBase = calcularAbertura(linea, tipoId, W, H, params, state.perfiles, state.herrajes, pVid, precioKg, {});
  const vidrios = resBase ? resBase.vidrios : [];
  const costoVidrios = vidrios.reduce((s, v) => s + (v.ancho/1000)*(v.alto/1000)*pVid, 0);

  // Obtener detalle de perfiles para mostrar
  const cortesRaw = getCortesRaw(linea, tipoId, W, H, params, state.perfiles);
  const perfilesFiltrados = state.perfiles.filter(pf => pf.linea_id === linea);
  const perfilesUsados = [...new Set(cortesRaw.filter(c => c.perfil).map(c => c.perfil.codigo || c.perfil.id))];
  const mmTotal = cortesRaw.filter(c => c.perfil).reduce((s, c) => s + c.largo * c.cantidad, 0);

  const filas = perfilesUsados.map(k => {
    const perfil = perfilesFiltrados.find(pf => pf.codigo === k || pf.id === k);
    if (!perfil) return '';
    // mm de 1 unidad, luego multiplicar por cant para mostrar el total real
    const mmEste1u = cortesRaw.filter(c => c.perfil && (c.perfil.codigo === k || c.perfil.id === k))
      .reduce((s, c) => s + c.largo * c.cantidad, 0);
    const mmEste = mmEste1u * cant;
    const fraccion = mmTotal > 0 ? mmEste1u / mmTotal : 0;
    const costoEste = cNueva.perfilesPorCodigo?.[k] || (cNueva.perfiles * fraccion);

    // Verificar si aprovecha sobrante
    const barrasExist = getBarrasExistentes(absExistentes, state.perfiles);
    const barrasDeEste = barrasExist[k] || [];
    const mmDisponible = barrasDeEste.reduce((s, b) => s + (b.resto || 0), 0);
    const esAhorro = criterio === 'proporcional' && mmDisponible >= mmEste;
    const iconoAhorro = esAhorro ? '<span style="color:#00E5A0;font-size:10px;margin-left:6px;">✓ aprovecha sobrante</span>' : '';

    return `<div class="preview-row">
      <span>[${k}] ${perfil.nombre}${iconoAhorro}</span>
      <span style="color:var(--text3)">${mmEste}mm${cant > 1 ? ' ('+cant+'u.)' : ''}</span>
      <span style="color:${esAhorro?'#00E5A0':'var(--text)'}">${fmt(costoEste)}</span>
    </div>`;
  }).join('');

  const vidFilas = vidrios.map(v => `
    <div class="preview-row">
      <span>${v.desc} (${v.ancho}x${v.alto}mm)${cant > 1 ? ' ×'+cant : ''}</span>
      <span style="color:var(--text3)">${((v.ancho/1000)*(v.alto/1000)*cant).toFixed(2)}m²</span>
      <span>${fmt((v.ancho/1000)*(v.alto/1000)*pVid*cant)}</span>
    </div>`).join('');

  // cNueva ya viene con el costo total para N unidades desde calcularCostoAberturas
  const costoTotal = cNueva.perfiles + (costoVidrios * cant) + cNueva.herrajes;
  const criterioLabel = criterio === 'proporcional' ? 'precio proporcional' : 'precio perfil completo';

  preview.innerHTML = `
    <div class="preview-box">
      <div class="preview-title">Vista previa · ${fmt(precioKg)}/kg · ${criterioLabel}</div>
      ${filas}${vidFilas}
      <div class="preview-total"><span>Total x ${cant} u.</span><span>${fmt(costoTotal)}</span></div>
    </div>`;
  if (btnAb) btnAb.disabled = false;
}

async function confirmarAgregarAbertura() {
  const btn = document.getElementById('btnAgregarAb');
  setBtnLoading(btn, true, 'Calculando...');
  try {
    const linea_id = document.getElementById('m_linea')?.value;
    const tipoId   = document.getElementById('m_tipo')?.value;
    const W        = parseInt(document.getElementById('m_ancho')?.value);
    const H        = parseInt(document.getElementById('m_alto')?.value);
    const cant     = parseInt(document.getElementById('m_cant')?.value) || 1;
    const pVid     = parseFloat(document.getElementById('m_pvid')?.value) || 8500;
    if (!W || !H) return;

    const p = state.presupuestos.find(x => x.id === state.presupuestoActivo);
    const precioKg = getPrecioKgPresupuesto(p);
    const tipos = getTiposLinea(linea_id);
    const tipo = tipos.find(t => t.id === tipoId);
    const params = {};
    (tipo?.params || []).forEach(pa => { params[pa.id] = parseInt(document.getElementById(`param_${pa.id}`)?.value) || pa.default; });

    const absExistentes = state.aberturas.filter(a => a.presupuesto_id === state.presupuestoActivo);
    const barrasExistentes = getBarrasExistentes(absExistentes, state.perfiles);
    const res = calcularAbertura(linea_id, tipoId, W, H, params, state.perfiles, state.herrajes, pVid, precioKg, barrasExistentes);
    if (!res) return;

    const linea = state.lineas.find(l => l.id === linea_id);

    // Snapshot de perfiles al momento de carga (congela peso y precio/kg)
    const perfilesSnap = state.perfiles
      .filter(pf => pf.linea_id === linea_id)
      .map(pf => ({ id: pf.id, codigo: pf.codigo, nombre: pf.nombre, peso_tira: pf.peso_tira, largo_barra: pf.largo_barra }));

    // Snapshot de herrajes al momento de carga (congela precio)
    const herrajesCalcSnap = getHerrajesTipo(linea_id, tipoId, params);
    const herrajesSnap = herrajesCalcSnap.map(h => {
      const hObj = state.herrajes.find(x => x.id === h.id);
      return { id: h.id, nombre: hObj?.nombre || h.descripcion || h.id, cantidad: h.cantidad, precio: Number(hObj?.precio || 0), unidad: hObj?.unidad || 'u' };
    });

    const ab = {
      id: genId(),
      presupuesto_id: state.presupuestoActivo,
      linea_id,
      linea: linea?.nombre || linea_id,
      tipo_id: tipoId,
      nombre: `${linea?.nombre} - ${tipo?.nombre}`,
      ancho: W, alto: H, cantidad: cant,
      params: JSON.stringify(params),
      precio_vidrio: pVid,
      precio_kg: precioKg,
      costo_perfiles: res.costoPerfiles,
      costo_vidrios:  res.costoVidrios,
      costo_herrajes: res.costoHerrajes,
      optimizacion: JSON.stringify(res.optimizacion),
      vidrios:      JSON.stringify(res.vidrios),
      perfiles_snap: JSON.stringify(perfilesSnap),
      herrajes_snap: JSON.stringify(herrajesSnap),
    };
    state.aberturas.push(ab);
    await sheetsAppend(SHEETS.aberturas, ab);

    await recalcularTotal();
    closeModal();
    toast('Abertura agregada');
  } catch(e) {
    toast('Error al agregar abertura', 'error');
    setBtnLoading(btn, false);
  } finally {
    render();
  }
}

// SVG DESCRIPTIVOS POR TIPO DE ABERTURA (con proporciones reales)
// ============================================================
function svgAbertura(tipo_id, anchoMm, altoMm, maxW, maxH) {
  // Calcular dimensiones respetando la proporción real de la abertura
  maxW = maxW || 160;
  maxH = maxH || 200;
  const ratio = anchoMm / altoMm;
  let W, H;
  if (ratio >= 1) {
    // Más ancha que alta
    W = maxW;
    H = Math.round(maxW / ratio);
    if (H > maxH) { H = maxH; W = Math.round(maxH * ratio); }
  } else {
    // Más alta que ancha (puertas, etc.)
    H = maxH;
    W = Math.round(maxH * ratio);
    if (W > maxW) { W = maxW; H = Math.round(maxW / ratio); }
  }
  // Asegurar mínimos
  W = Math.max(W, 40); H = Math.max(H, 40);

  const pad = 6;
  const iW = W - pad*2;  // interior width
  const iH = H - pad*2;  // interior height
  const cx = W/2, cy = H/2;
  const fc = '#1e3a5f';   // frame color
  const gc = '#0ea5e9';   // glass/detail color
  const gf = '#dbeafe';   // glass fill
  const sw = Math.max(2, Math.round(Math.min(W,H)/30)); // stroke adaptivo

  const label = anchoMm + 'x' + altoMm + 'mm';
  const labelY = H + 14;
  const totalH = H + 18;

  let interior = '';

  if (tipo_id === 'ventana-corrediza') {
    const mid = pad + iW/2;
    interior = ''
      // divisor central
      + '<line x1="'+mid+'" y1="'+pad+'" x2="'+mid+'" y2="'+(H-pad)+'" stroke="'+fc+'" stroke-width="'+sw+'"/>'
      // hoja izquierda (vidrio)
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5" opacity="0.8"/>'
      // hoja derecha (vidrio)
      + '<rect x="'+(mid+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5" opacity="0.8"/>'
      // flecha izquierda
      + '<line x1="'+(pad+8)+'" y1="'+cy+'" x2="'+(mid-8)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>'
      // flecha derecha
      + '<line x1="'+(mid+8)+'" y1="'+cy+'" x2="'+(W-pad-8)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>';
  }
  else if (tipo_id === 'puerta-abrir') {
    // Hoja completa
    const bx = pad+2, by = pad+2, bw = iW-4, bh = iH-4;
    // Arco de apertura (cuarto de círculo desde esquina)
    const r = Math.min(bw, bh) * 0.85;
    interior = ''
      + '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // Arco de apertura
      + '<path d="M '+(bx+bw)+' '+by+' A '+r+' '+r+' 0 0 0 '+bx+' '+(by+r)+'" fill="none" stroke="'+gc+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      // Manija
      + '<circle cx="'+(bx+bw-6)+'" cy="'+cy+'" r="3" fill="'+gc+'"/>';
  }
  else if (tipo_id === 'puerta-corrediza') {
    const mid = pad + iW/2;
    interior = ''
      // hoja frontal (más oscura)
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW/2-2)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="2"/>'
      // hoja trasera (más transparente)
      + '<rect x="'+(mid)+'" y="'+(pad+4)+'" width="'+(iW/2-2)+'" height="'+(iH-8)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1" opacity="0.4"/>'
      // flecha
      + '<line x1="'+(pad+8)+'" y1="'+cy+'" x2="'+(mid-4)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>'
      + '<circle cx="'+(mid-8)+'" cy="'+cy+'" r="3" fill="'+gc+'"/>';
  }
  else if (tipo_id === 'puerta-ventana-corrediza') {
    // Similar a ventana corrediza pero más alta — se nota en la proporción automática
    const mid = pad + iW/2;
    interior = ''
      + '<line x1="'+mid+'" y1="'+pad+'" x2="'+mid+'" y2="'+(H-pad)+'" stroke="'+fc+'" stroke-width="'+sw+'"/>'
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="2"/>'
      + '<rect x="'+(mid+2)+'" y="'+(pad+2)+'" width="'+(iW/2-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5" opacity="0.7"/>'
      // Manija en hoja izquierda
      + '<circle cx="'+(mid-8)+'" cy="'+cy+'" r="4" fill="'+gc+'"/>'
      // Flecha deslizamiento
      + '<line x1="'+(pad+10)+'" y1="'+cy+'" x2="'+(mid-14)+'" y2="'+cy+'" stroke="'+gc+'" stroke-width="1.5" stroke-dasharray="3,2"/>';
  }
  else if (tipo_id === 'pano-fijo') {
    interior = ''
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // Cruces decorativas (reflexión de luz)
      + '<line x1="'+(pad+6)+'" y1="'+(pad+6)+'" x2="'+(W-pad-6)+'" y2="'+(H-pad-6)+'" stroke="'+gc+'" stroke-width="1" opacity="0.3"/>'
      + '<line x1="'+(W-pad-6)+'" y1="'+(pad+6)+'" x2="'+(pad+6)+'" y2="'+(H-pad-6)+'" stroke="'+gc+'" stroke-width="1" opacity="0.3"/>';
  }
  else if (tipo_id === 'ventana-abrir') {
    const bx = pad+2, by = pad+2, bw = iW-4, bh = iH-4;
    const r = Math.min(bw, bh) * 0.8;
    interior = ''
      + '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // Arco apertura desde abajo
      + '<path d="M '+bx+' '+(by+bh)+' A '+r+' '+r+' 0 0 1 '+(bx+r)+' '+by+'" fill="none" stroke="'+gc+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      + '<circle cx="'+(bx+bw-6)+'" cy="'+cy+'" r="3" fill="'+gc+'"/>';
  }
  else if (tipo_id === 'banderola') {
    const midY = pad + iH * 0.4;
    interior = ''
      // parte superior (banderola que abre)
      + '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW-4)+'" height="'+(midY-pad-2)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>'
      // arco de apertura
      + '<path d="M '+(pad+2)+' '+(pad+2)+' L '+cx+' '+midY+' L '+(W-pad-2)+' '+(pad+2)+'" fill="none" stroke="'+gc+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      // parte inferior (fijo)
      + '<rect x="'+(pad+2)+'" y="'+(midY+2)+'" width="'+(iW-4)+'" height="'+(H-pad-midY-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1" opacity="0.5"/>';
  }
  else {
    interior = '<rect x="'+(pad+2)+'" y="'+(pad+2)+'" width="'+(iW-4)+'" height="'+(iH-4)+'" fill="'+gf+'" stroke="'+gc+'" stroke-width="1.5"/>';
  }

  return '<svg width="'+W+'" height="'+totalH+'" viewBox="0 0 '+W+' '+totalH+'" xmlns="http://www.w3.org/2000/svg">'
    // Marco exterior
    + '<rect x="0" y="0" width="'+W+'" height="'+H+'" rx="2" fill="#f8fafc" stroke="'+fc+'" stroke-width="'+sw+'"/>'
    + interior
    // Etiqueta de medidas
    + '<text x="'+cx+'" y="'+(totalH-2)+'" text-anchor="middle" font-size="9" fill="'+fc+'" font-family="monospace" font-weight="600">'+label+'</text>'
    + '</svg>';
}

// Convierte SVG a PNG data URI via Canvas (para Word)
function svgToPngDataUri(tipo_id, anchoMm, altoMm) {
  return new Promise((resolve) => {
    const svg = svgAbertura(tipo_id, anchoMm, altoMm, 120, 160);
    const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width || 120;
      canvas.height = img.height || 175;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(''); };
    img.src = url;
  });
}

function imprimirPresupuesto(id) {
  const p = state.presupuestos.find(x => x.id === id);

  const abs = state.aberturas.filter(a => a.presupuesto_id === id);
  const markup = Number(p.markup || 0);
  const criterio = state._criterioPrecio || 'proporcional';
  const precioKg = getPrecioKgPresupuesto(p);

  // Calcular costos con el criterio activo
  const costos = calcularCostoAberturas(abs, state.perfiles, state.herrajes, precioKg, criterio, state.umbral_sobrante);
  const subtotal = Object.values(costos).reduce((s, c) => s + c.perfiles + c.vidrios + c.herrajes, 0);
  const totalFinal = subtotal * (1 + markup / 100);

  const aberturasHtml = abs.map((a, i) => {
    const svg = svgAbertura(a.tipo_id, a.ancho, a.alto, 130, 180);
    const c = costos[a.id] || { perfiles: 0, vidrios: 0, herrajes: 0 };
    const precioUnitarioSinMarkup = c.perfiles + c.vidrios + c.herrajes;
    const precioUnitario = precioUnitarioSinMarkup * (1 + markup / 100);
    const precioTotal = precioUnitario * Number(a.cantidad);

            <span style="font-size:13px;color:#475569;"><b>Medidas:</b> ${a.ancho} x ${a.alto} mm</span>
            <span style="font-size:13px;color:#475569;"><b>Cantidad:</b> ${a.cantidad} u. · <b>${fmt(precioUnitario)}</b> c/u</span>

          </div>
          <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;">
            <span style="background:#e0f2fe;color:#0369a1;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">${p.color_al || ''}</span>
            <span style="background:#f0fdf4;color:#15803d;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">${p.tipo_al || ''}</span>
          </div>
        </div>
        <div style="text-align:right;min-width:80px;">
          <div style="font-size:15px;font-weight:800;color:#0f172a;">${fmt(precioTotal)}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px;">${String(i+1).padStart(2,'0')}</div>
        </div>
      </div>`;
  }).join('');

  const ST = '<scr'+'ipt>window.onload=()=>window.print();</'+'script>';
  const css = '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;color:#0f172a;background:#fff;padding:40px;max-width:800px;margin:0 auto}@media print{body{padding:20px}}</style>';
  const html = '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Presupuesto - '+p.cliente+'</title>'+css+'</head><body>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:24px;border-bottom:3px solid #0f172a;">'
      +'<div><div style="font-size:28px;font-weight:800;letter-spacing:-1px;">Alum<span style="color:#00b37e;">Pro</span></div>'

      +'<div style="text-align:right;"><div style="font-size:11px;color:#94a3b8;text-transform:uppercase;">Presupuesto</div>'
      +'<div style="font-size:12px;color:#475569;">'+p.fecha+'</div></div>'
    +'</div>'
    +'<div style="background:#f8fafc;border-radius:12px;padding:20px 24px;margin-bottom:28px;border:1px solid #e2e8f0;">'
      +'<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;">'
        +'<div><div style="font-size:11px;color:#94a3b8;text-transform:uppercase;margin-bottom:4px;">Cliente</div>'

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

// ============================================================
// EXPORTAR WORD (.doc HTML)
// ============================================================
async function exportarWord(id) {
  const p = state.presupuestos.find(x => x.id === id);
  if (!p) return;
  toast('Generando Word...');
  const abs = state.aberturas.filter(a => a.presupuesto_id === id);
  const markup = Number(p.markup || 0);
  const subtotal = abs.reduce((s, a) => s + Number(a.costo_perfiles||0) + Number(a.costo_vidrios||0) + Number(a.costo_herrajes||0), 0);
  const totalFinal = subtotal * (1 + markup / 100);

  // Generar todos los PNG en paralelo
  const pngs = await Promise.all(abs.map(a => svgToPngDataUri(a.tipo_id, a.ancho, a.alto)));

  const filaAberturas = abs.map((a, i) => {
    const total = Number(a.costo_perfiles||0)+Number(a.costo_vidrios||0)+Number(a.costo_herrajes||0);
    const imgTag = pngs[i] ? '<img src="'+pngs[i]+'" width="90" style="display:block;margin:0 auto;" alt="abertura">' : '';
    return '<tr>'
      +'<td style="border:1px solid #ccc;padding:8px;text-align:center;vertical-align:middle;">'+(i+1)+'</td>'
      +'<td style="border:1px solid #ccc;padding:10px;text-align:center;vertical-align:middle;">'+imgTag+'</td>'
      +'<td style="border:1px solid #ccc;padding:8px;vertical-align:middle;">'
        +'<b style="font-size:11pt;">'+a.nombre+'</b><br>'
        +'<span style="font-size:9pt;color:#555;">'+a.ancho+' x '+a.alto+' mm &nbsp;·&nbsp; '+a.cantidad+' u. &nbsp;·&nbsp; '+a.linea+'</span><br>'
        +'<span style="font-size:9pt;color:#555;">'+(p.color_al||'-')+' / '+(p.tipo_al||'-')+'</span>'
      +'</td>'
      +'<td style="border:1px solid #ccc;padding:8px;text-align:right;vertical-align:middle;white-space:nowrap;font-weight:bold;font-size:11pt;">'+fmt(total * Number(a.cantidad))+'</td>'
      +'</tr>';
  }).join('');

  const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'
    +'<head><meta charset="UTF-8">'
    +'<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>90</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->'
    +'<style>'
    +'body{font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#1a1a1a;margin:2cm}'
    +'h1{font-size:22pt;color:#0f172a;margin-bottom:4px}'
    +'h2{font-size:13pt;color:#374151;border-bottom:2px solid #0f172a;padding-bottom:4px;margin-top:24px}'
    +'.subtitulo{font-size:10pt;color:#64748b;margin-bottom:20px}'
    +'.datos-grid{display:table;width:100%;margin-bottom:20px}'
    +'.datos-col{display:table-cell;width:50%;vertical-align:top}'
    +'.label{font-size:9pt;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px}'
    +'.valor{font-size:11pt;font-weight:bold;margin-bottom:12px}'
    +'table{border-collapse:collapse;width:100%;margin-bottom:16px}'
    +'th{background:#0f172a;color:#fff;padding:8px;text-align:left;font-size:10pt}'
    +'td{font-size:10pt}'
    +'.total-box{background:#f8fafc;border:2px solid #0f172a;padding:16px;text-align:right;margin-top:16px}'
    +'.total-label{font-size:10pt;color:#64748b}'
    +'.total-valor{font-size:18pt;font-weight:bold;color:#00b37e}'
    +'.footer{font-size:9pt;color:#94a3b8;text-align:center;margin-top:32px;border-top:1px solid #e2e8f0;padding-top:12px}'

      +'<div class="datos-col">'

  const a = document.createElement('a');
  a.href = url;

  a.click();
  URL.revokeObjectURL(url);
